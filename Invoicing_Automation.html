<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>대금청구 자동화 시스템</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{
  --indigo:#4338ca;--indigo-dark:#3730a3;--indigo-light:#e0e7ff;
  --blue:#2563eb;--purple:#7c3aed;--purple-light:#f3e8ff;
  --green:#16a34a;--green-light:#dcfce7;
  --red:#dc2626;--red-light:#fee2e2;
  --orange:#c2410c;--orange-light:#ffedd5;
  --yellow:#ca8a04;--yellow-light:#fef9c3;
  --gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;
  --gray-300:#d1d5db;--gray-400:#9ca3af;--gray-600:#4b5563;
  --gray-700:#374151;--gray-900:#111827;
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f0f2f7;color:var(--gray-900);font-size:14px;line-height:1.5}

/* ── 헤더 ── */
.header{background:linear-gradient(135deg,#4338ca 0%,#6366f1 100%);color:#fff;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(67,56,202,.3)}
.header h1{font-size:17px;font-weight:700;letter-spacing:-0.3px}
.header p{font-size:11px;color:#c7d2fe;margin-top:3px}

/* ── 탭바 ── */
.tab-bar{background:#fff;border-bottom:2px solid var(--gray-200);display:flex;overflow-x:auto;padding:0 24px;box-shadow:var(--shadow)}
.tab-bar::-webkit-scrollbar{height:0}
.tab-btn{padding:13px 16px;font-size:12px;font-weight:600;white-space:nowrap;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;color:var(--gray-400);margin-bottom:-2px;transition:all .15s}
.tab-btn.active{border-bottom-color:var(--indigo);color:var(--indigo)}
.tab-btn:hover{color:var(--gray-700);background:var(--gray-50)}

/* ── 레이아웃 ── */
.content{padding:18px 32px;max-width:1440px;margin:0 auto}
.page{display:none}.page.active{display:block}

/* ── 카드 ── */
.card{background:#fff;border-radius:var(--radius);border:1px solid var(--gray-200);padding:18px;margin-bottom:12px;box-shadow:var(--shadow)}
.card-sm{background:#fff;border-radius:var(--radius);border:1px solid var(--gray-200);padding:13px 16px;margin-bottom:8px;box-shadow:var(--shadow)}

/* ── 현장관리 필터 컨트롤 ── */
.proj-ctrl{background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius);padding:10px 12px;margin-bottom:10px;display:flex;flex-direction:column;gap:7px}
.proj-ctrl-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.proj-filter-label{font-size:11px;font-weight:700;color:#6b7280;white-space:nowrap;min-width:48px}
.pfbtn{border:1px solid #e5e7eb;background:#fff;border-radius:999px;padding:3px 11px;font-size:12px;cursor:pointer;color:#374151;transition:all .15s;white-space:nowrap}
.pfbtn:hover{border-color:#6366f1;color:#4338ca}
.pfbtn.active{background:#4338ca;color:#fff;border-color:#4338ca}
.pfbtn.active-green{background:#16a34a;color:#fff;border-color:#16a34a}
.pfbtn.active-purple{background:#7c3aed;color:#fff;border-color:#7c3aed}
.pfbtn.active-orange{background:#ea580c;color:#fff;border-color:#ea580c}
.pfbtn.active-red{background:#dc2626;color:#fff;border-color:#dc2626}
.pfbtn.active-teal{background:#0d9488;color:#fff;border-color:#0d9488}
.view-toggle-btn{border:1px solid #e5e7eb;background:#fff;border-radius:6px;padding:5px 10px;font-size:13px;cursor:pointer;transition:all .15s}
.view-toggle-btn.active{background:#4338ca;color:#fff;border-color:#4338ca}
.proj-sort-sel{border:1px solid #d1d5db;border-radius:8px;padding:5px 8px;font-size:12px;color:#374151;background:#fff;cursor:pointer;outline:none}
/* ── 리스트뷰 테이블 ── */
.proj-list-table{width:100%;border-collapse:collapse;background:#fff;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--gray-200);font-size:12px}
.proj-list-table th{background:#f9fafb;padding:8px 10px;text-align:left;font-size:11px;font-weight:700;color:#6b7280;border-bottom:1px solid #e5e7eb;white-space:nowrap}
.proj-list-table td{padding:7px 10px;border-bottom:1px solid #f3f4f6;vertical-align:middle;white-space:nowrap;max-width:260px;overflow:hidden;text-overflow:ellipsis}
.proj-list-table tr:last-child td{border-bottom:none}
.proj-list-table tr:hover td{background:#f9fafb}
/* ── 페이지네이션 ── */
.proj-pagination{display:flex;justify-content:center;align-items:center;gap:4px;padding:12px 0 4px}
.ppage{border:1px solid #e5e7eb;background:#fff;border-radius:6px;padding:4px 9px;font-size:12px;cursor:pointer;min-width:30px;text-align:center;color:#374151;transition:all .15s}
.ppage:hover{border-color:#6366f1;color:#4338ca}
.ppage.active{background:#4338ca;color:#fff;border-color:#4338ca}
.ppage.ellipsis{border:none;background:none;cursor:default;color:#9ca3af}
/* ── 그룹 헤더 ── */
.group-header{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--radius-sm);margin-bottom:8px;margin-top:18px;font-size:12px;font-weight:700;letter-spacing:.3px}
.group-header:first-child{margin-top:0}
.gh-consulting{background:#dbeafe;color:#1e40af;border-left:3px solid #2563eb}
.gh-tech{background:var(--purple-light);color:#5b21b6;border-left:3px solid var(--purple)}
.gh-material{background:var(--orange-light);color:#92400e;border-left:3px solid #ea580c}
.gh-etc{background:#ccfbf1;color:#0f766e;border-left:3px solid #0d9488}
.group-count{margin-left:auto;background:rgba(0,0,0,.08);border-radius:999px;padding:1px 8px;font-size:11px}

/* ── 현장 카드 (리스트) ── */
.proj-card{background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius-sm);padding:12px 14px;box-shadow:var(--shadow);transition:box-shadow .15s;height:100%}
.proj-card:hover{box-shadow:var(--shadow-md)}

/* ── 그리드 ── */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}

/* ── stat 카드 ── */
.stat-card{background:#fff;border-radius:var(--radius);border:1px solid var(--gray-200);padding:16px;box-shadow:var(--shadow)}
.stat-card .label{font-size:11px;color:var(--gray-400);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.stat-card .value{font-size:20px;font-weight:700;letter-spacing:-0.5px}
.v-indigo{color:var(--indigo)}.v-blue{color:var(--blue)}.v-green{color:var(--green)}
.v-red{color:var(--red)}.v-gray{color:var(--gray-400)}

/* ── 뱃지 ── */
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.1px}
.b-blue{background:#dbeafe;color:#1d4ed8}.b-green{background:var(--green-light);color:var(--green)}
.b-yellow{background:var(--yellow-light);color:var(--yellow)}.b-red{background:var(--red-light);color:var(--red)}
.b-gray{background:#ccfbf1;color:#0f766e}.b-purple{background:var(--purple-light);color:var(--purple)}
.b-orange{background:var(--orange-light);color:var(--orange)}.b-patent{background:#fce7f3;color:#be185d}

/* ── 버튼 ── */
.btn{padding:8px 16px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:all .15s;letter-spacing:.1px}
.btn-primary{background:var(--indigo);color:#fff}.btn-primary:hover{background:var(--indigo-dark)}
.btn-primary:disabled{background:#a5b4fc;cursor:not-allowed}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:#1d4ed8}
.btn-blue:disabled{background:#93c5fd;cursor:not-allowed}
.btn-purple{background:var(--purple);color:#fff}.btn-purple:hover{background:#6d28d9}
.btn-purple:disabled{background:#c4b5fd;cursor:not-allowed}
.btn-gray{background:var(--gray-100);color:var(--gray-700);border:1px solid var(--gray-200)}.btn-gray:hover{background:var(--gray-200)}
.btn-orange{background:#fff7ed;color:var(--orange);border:1px solid #fed7aa}.btn-orange:hover{background:var(--orange-light)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#15803d}
.btn-red{background:var(--red-light);color:var(--red);border:1px solid #fecaca}.btn-red:hover{background:#fecaca}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-full{width:100%;display:block;margin-bottom:6px}
.btn-row{display:flex;gap:8px;margin-top:10px}

/* ── 섹션 타이틀 ── */
.sec-title{font-size:13px;font-weight:700;color:var(--gray-700);margin-bottom:12px;margin-top:22px;display:flex;align-items:center;gap:6px}
.sec-title:first-child{margin-top:0}
.sec-title::before{content:'';display:inline-block;width:3px;height:14px;background:var(--indigo);border-radius:2px}

/* ── 프로젝트 헤더 ── */
.proj-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.proj-name{font-weight:700;font-size:15px;color:var(--gray-900)}
.proj-sub{font-size:12px;color:var(--gray-400);margin-top:3px}

/* ── 정보 박스 ── */
.info-box{border-radius:var(--radius-sm);padding:10px 14px;font-size:12px;margin-top:10px}
.info-blue{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.info-purple{background:#faf5ff;color:var(--purple);border:1px solid #e9d5ff}
.info-yellow{background:#fefce8;color:var(--yellow);border:1px solid #fde68a}
.info-gray{background:var(--gray-50);color:var(--gray-600);border:1px solid var(--gray-200)}
.info-red{background:#fef2f2;border:1px solid #fecaca}
.info-green{background:#f0fdf4;color:var(--green);border:1px solid #bbf7d0}

/* ── 테이블 ── */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;padding:6px 10px 6px 0;color:var(--gray-400);font-weight:600;border-bottom:2px solid var(--gray-200);font-size:11px;text-transform:uppercase;letter-spacing:.3px}
.tbl td{padding:8px 10px 8px 0;border-bottom:1px solid var(--gray-100)}
.tbl tr:last-child td{border-bottom:none}
.tbl .total-row td{background:var(--gray-50);font-weight:700;color:var(--indigo)}
.tbl input[type=date]{border:1px solid var(--gray-300);border-radius:4px;padding:3px 6px;font-size:11px;width:116px;font-family:inherit;color:var(--gray-700)}

/* ── 청구 박스 ── */
.bill-box{background:var(--gray-50);border-radius:var(--radius-sm);padding:14px;margin-bottom:14px;border:1px solid var(--gray-200)}
.bill-row{display:flex;justify-content:space-between;margin-bottom:7px;font-size:13px}
.bill-row:last-child{margin-bottom:0}
.bill-row.total{border-top:1px solid var(--gray-200);padding-top:10px;margin-top:10px;font-weight:700;font-size:14px}
.bill-row .lbl{color:var(--gray-400)}.bill-row .val{color:var(--gray-700)}
.bill-row.total .val{color:var(--indigo)}

/* ── 미수금 카드 ── */
.unpaid-card{background:#fff;border-radius:var(--radius);border:1px solid var(--gray-200);border-left:4px solid #f87171;padding:16px;margin-bottom:10px;box-shadow:var(--shadow)}
.paid-card{background:#fff;border-radius:var(--radius);border:1px solid var(--gray-200);border-left:4px solid #4ade80;padding:16px;margin-bottom:10px;box-shadow:var(--shadow)}

/* ── 모달 ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:100;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-md)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:18px 22px 14px;border-bottom:1px solid var(--gray-200)}
.modal-header h3{font-size:15px;font-weight:700;color:var(--gray-900)}
.modal-close{background:none;border:none;font-size:20px;color:var(--gray-400);cursor:pointer;line-height:1;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px}
.modal-close:hover{background:var(--gray-100);color:var(--gray-700)}
.modal-body{padding:18px 22px 22px}

/* ── 폼 필드 ── */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--gray-300);border-radius:var(--radius-sm);padding:9px 12px;font-size:13px;font-family:inherit;outline:none;color:var(--gray-900);background:#fff;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.field .hint{font-size:11px;color:var(--gray-400);margin-top:4px}

/* ── 기타 ── */
.calc-preview{background:#eff6ff;border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;margin-bottom:14px;border:1px solid #bfdbfe}
.calc-preview span{color:var(--gray-600)}.calc-preview strong{color:var(--indigo)}
.email-success{text-align:center;padding:28px 0}
.email-success .icon{font-size:44px;margin-bottom:14px}
.bill-preview-header{text-align:center;margin-bottom:20px}
.bill-preview-header h2{font-size:20px;letter-spacing:6px;font-weight:700}
.bill-preview-header p{font-size:11px;color:var(--gray-400);margin-top:4px}
.preview-section{border:1px solid var(--gray-200);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:14px}
.preview-section-head{background:var(--indigo);color:#fff;padding:8px 14px;font-size:12px;font-weight:700}
.preview-row{display:flex;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--gray-100);font-size:13px}
.preview-row:last-child{border-bottom:none}
.preview-row.total{background:#eff6ff;font-weight:700}
.preview-row .k{color:var(--gray-400)}.preview-row .v{color:var(--gray-900)}
.preview-row.total .v{color:var(--indigo)}
.upload-zone{border:2px dashed #a5b4fc;border-radius:var(--radius);padding:32px;text-align:center;background:#f5f3ff;cursor:pointer;transition:all .2s;margin-bottom:16px}
.upload-zone:hover{border-color:var(--indigo);background:#ede9fe}
.progress-wrap{margin-bottom:12px}
.progress-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--gray-400);margin-bottom:4px}
.progress-bar{height:6px;background:var(--gray-200);border-radius:999px;overflow:hidden}
.progress-fill{height:100%;border-radius:999px;transition:width .3s}
.fill-green{background:var(--green)}.fill-orange{background:#f97316}
.proj-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.proj-field label{font-size:11px;color:var(--gray-400);display:block;margin-bottom:2px}
.proj-field span{font-size:13px;color:var(--gray-700)}
.proj-field span.bold{font-weight:600;color:var(--indigo)}
.upload-zone .icon{font-size:36px;margin-bottom:8px}
.upload-zone p{font-size:13px;color:#6b7280}
.upload-zone strong{color:#4338ca}
.upload-result{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px;margin-bottom:14px}
.upload-result h4{color:#16a34a;font-size:13px;font-weight:700;margin-bottom:8px}
.upload-table{width:100%;border-collapse:collapse;font-size:11px;max-height:200px;overflow-y:auto;display:block}
.upload-table th{background:#e5e7eb;padding:4px 8px;text-align:left;font-weight:600;color:#374151;position:sticky;top:0}
.upload-table td{padding:4px 8px;border-bottom:1px solid #f3f4f6;color:#374151}
.upload-table tr:nth-child(even) td{background:#f9fafb}
.col-map{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:14px;margin-bottom:14px}
.col-map h4{color:#92400e;font-size:13px;font-weight:700;margin-bottom:10px}
.col-map-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.col-map-item label{font-size:11px;color:#6b7280;display:block;margin-bottom:2px}
.col-map-item select{width:100%;border:1px solid #d1d5db;border-radius:6px;padding:5px 8px;font-size:12px;font-family:inherit}
/* 검색바 */
.search-bar{display:flex;gap:8px;margin-bottom:16px;align-items:center}
.search-bar input{flex:1;border:1px solid #d1d5db;border-radius:8px;padding:9px 14px;font-size:13px;font-family:inherit;outline:none}
.search-bar input:focus{border-color:#6366f1;box-shadow:0 0 0 2px #e0e7ff}
/* 첨부파일 */
.attach-item{display:flex;align-items:center;justify-content:space-between;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:12px}
.attach-item .fname{color:#374151;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.attach-item .fsize{color:#9ca3af;margin:0 8px;font-size:11px}
.attach-btn-del{background:none;border:none;cursor:pointer;color:#9ca3af;font-size:16px;line-height:1;padding:0 4px}
.attach-btn-del:hover{color:#dc2626}
/* 공사안내문 알림 배너 */
.notice-banner{background:#fef9c3;border:1px solid #fde68a;border-radius:10px;padding:12px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.notice-banner .ntxt{font-size:12px;color:#92400e}
.notice-banner .ntxt strong{color:#b45309}
@media(max-width:600px){.grid-4{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:repeat(2,1fr)}.proj-grid{grid-template-columns:repeat(2,1fr)}.btn-row{flex-direction:column}.col-map-grid{grid-template-columns:1fr}}

/* ══ 자재주문 v3 ══ */
.ord-stat-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:12px}
.ord-stat-box{background:#fff;border-radius:10px;border:1px solid var(--gray-200);padding:10px 12px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.05);cursor:pointer;transition:all .15s}
.ord-stat-box:hover{border-color:#a5b4fc}
.ord-stat-box.on{border-color:var(--indigo);background:var(--indigo-light)}
.ord-stat-box .snum{font-size:19px;font-weight:800;margin-top:3px}
.ord-stat-box .slbl{font-size:10px;color:var(--gray-400);font-weight:600}
.ord-ctrl{background:#fff;border:1px solid var(--gray-200);border-radius:10px;padding:8px 12px;margin-bottom:10px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.ord-ftab{border:1.5px solid var(--gray-200);background:#fff;border-radius:999px;padding:4px 11px;font-size:11px;font-weight:600;cursor:pointer;color:var(--gray-600);transition:all .15s;white-space:nowrap;font-family:inherit}
.ord-ftab:hover{border-color:#a5b4fc;color:var(--indigo)}
.ord-ftab.on{background:var(--indigo);color:#fff;border-color:var(--indigo)}
.ord-ftab.on-green{background:var(--green);color:#fff;border-color:var(--green)}
.ord-ftab.on-orange{background:#ea580c;color:#fff;border-color:#ea580c}
.ord-ftab.on-red{background:var(--red);color:#fff;border-color:var(--red)}
.ord-ftab.on-purple{background:var(--purple);color:#fff;border-color:var(--purple)}
.site-tbl2{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;border:1px solid var(--gray-200);font-size:12px}
.site-tbl2 thead th{background:#f8f9ff;padding:8px 10px;text-align:left;font-size:10px;font-weight:700;color:var(--gray-600);border-bottom:2px solid var(--gray-200);white-space:nowrap}
.site-row2{cursor:pointer;transition:background .1s}
.site-row2 td{border-bottom:1px solid var(--gray-100)}
.site-row2:hover td{background:#fafbff}
.site-row2.expanded td{background:#f5f3ff}
.sc2{padding:9px 10px;vertical-align:middle}

<!-- 모달: 프로젝트 등록/수정 -->
<div class="modal-overlay" id="modal-project">

        </div>

      <div class="field" style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><label>착공일</label><input id="f-startdate" type="date" style="width:100%;box-sizing:border-box"/></div>
        <div><label>준공일</label><input id="f-enddate" type="date" style="width:100%;box-sizing:border-box"/></div>
      </div>
      <div class="field" style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><label>담당자 이메일</label><input id="f-email" type="email" style="width:100%;box-sizing:border-box"/></div>
        <div><label>상태</label><select id="f-status" style="width:100%;box-sizing:border-box"><option>진행중</option><option>완료</option><option>대기</option><option>유찰</option><option>취소</option></select></div>
      </div>
      <div class="field"><label>고객사 신용등급</label>

      <div class="btn-row">

        <button class="btn btn-gray" style="flex:1" onclick="closeModal('modal-project')">취소</button>
      </div>
    </div>
  </div>
</div>

// ── 공사이용안내서 PDF 저장소 ──
const PDF_STORE_KEY = "guide_pdf_store_v1";
let guidePdfStore = { categories: {}, roadmap: null, noticeTemplate: null, billTemplate: null };
// categories:      { "재도장": {name, base64, size, uploadedAt}, ... }
// roadmap:         { name, base64, size, uploadedAt } | null
// noticeTemplate:  { name, base64, size, uploadedAt } | null  ← 공문 xlsx 템플릿
// billTemplate:    { name, base64, size, uploadedAt } | null  ← 자문료 청구서 xlsx 템플릿

function loadGuidePdfStore(){
  try{
    const raw = localStorage.getItem(PDF_STORE_KEY);
    if(raw) guidePdfStore = JSON.parse(raw);
    if(!guidePdfStore.categories)     guidePdfStore.categories     = {};
    if(guidePdfStore.roadmap         === undefined) guidePdfStore.roadmap         = null;
    if(guidePdfStore.noticeTemplate  === undefined) guidePdfStore.noticeTemplate  = null;
    if(guidePdfStore.billTemplate    === undefined) guidePdfStore.billTemplate    = null;
  }catch(e){ guidePdfStore = { categories:{}, roadmap:null, noticeTemplate:null, billTemplate:null }; }
}

function saveGuidePdfStore(){
  try{
    localStorage.setItem(PDF_STORE_KEY, JSON.stringify(guidePdfStore));
  }catch(e){
    alert("저장 공간이 부족합니다. 설정 탭에서 불필요한 PDF를 삭제 후 다시 시도해주세요.");
  }
}

// ── 하이웍스 회사 도메인 ──
const HIWORKS_DOMAIN_KEY = "hiworks_company_domain_v1";
let hiworksDomain = "";  // 예: "netformrnd.com" → mail.office.hiworks.com/netformrnd.com/mail/webmail/m_write

function loadHiworksDomain(){
  hiworksDomain = localStorage.getItem(HIWORKS_DOMAIN_KEY) || "netformrnd.com";
}
function saveHiworksDomain(domain){
  hiworksDomain = domain.trim();
  localStorage.setItem(HIWORKS_DOMAIN_KEY, hiworksDomain);
}

function buildHiworksUrl(to, subject, body){
  if(!hiworksDomain){
    alert("⚙️ 설정 탭에서 하이웍스 회사 도메인을 먼저 입력해주세요.\n예: netformrnd");
    showTab(8);
    return null;
  }
  const base = `https://mail.office.hiworks.com/${encodeURIComponent(hiworksDomain)}/mail/webmail/m_write`;
  const params = new URLSearchParams({ to, subject, contents: body });
  return `${base}?${params.toString()}`;
}

// ── 유틸 ──
const fmtNum = n => (!n && n!==0) ? "-" : Number(n).toLocaleString("ko-KR")+"원";
const fmtDate = d => d || "-";
const todayStr = () => new Date().toISOString().slice(0,10);

function typeColor(t){
  if(t==="공고")return"b-gray"; if(t==="컨설팅")return"b-blue"; if(t==="기술자재형")return"b-purple"; if(t==="자재판매형")return"b-orange"; return"b-gray";
}
function badge(text,cls){return `<span class="badge ${cls}">${text}</span>`;}
function creditBadge(grade){
  if(!grade||grade==="신규") return badge("신규","b-gray");
  if(grade==="A") return badge("A등급","b-green");
  if(grade==="B") return badge("B등급","b-yellow");
  if(grade==="C") return badge("C등급","b-red");
  return "";
}

function calcBilling(project){
  const bid=Number(project.bidPrice)||0;
  const total=project.orders.reduce((s,o)=>s+Number(o.amount),0);
  const t=project.constructionType;
  if(t==="컨설팅"||t==="기타"||t==="공고") return {type:"자재대금",amount:total,materialAmt:total,patentAmt:0,detail:"자재대금 전액 (준공 시 청구)",isExec:true,hasPatent:false};
  const thr=bid*0.02;
  if(total===0) return {type:"특허료(자재없음)",amount:Math.round(bid*0.01),materialAmt:0,patentAmt:Math.round(bid*0.01),detail:"낙찰가 × 1%",isExec:false,hasPatent:true};
  if(total>=thr) return {type:"자재대금(특허료없음)",amount:total,materialAmt:total,patentAmt:0,detail:"자재 2% 초과 · 특허료 없음",isExec:false,hasPatent:false};
  const p=Math.round((thr-total)/2);
  return {type:"자재대금+특허료",amount:total+p,materialAmt:total,patentAmt:p,detail:`자재 ${fmtNum(total)} + 특허료 ${fmtNum(p)}`,isExec:false,hasPatent:true};
}

function daysLeft(dateStr){
  if(!dateStr)return null;
  if(!/^\d{4}-\d{2}-\d{2}/.test(dateStr))return null;
  const d=new Date(dateStr);
  if(isNaN(d.getTime()))return null;
  return Math.ceil((d-new Date())/86400000);
}

function excelDateToStr(v){
  if(!v)return"";
  if(typeof v==="string"){
    const d=v.replace(/\./g,"-").replace(/년|월/g,"-").replace(/일/g,"").trim();
    return d;
  }
  if(typeof v==="number"){
    const date=new Date((v-25569)*86400*1000);
    return date.toISOString().slice(0,10);
  }
  return String(v);
}

function cleanNum(v){
  if(!v)return 0;
  if(typeof v==="number")return v;
  return Number(String(v).replace(/,/g,"").replace(/원/g,"").trim())||0;
}

  const guideUnsent = projects.filter(p=>
    p.constructionType==="기술자재형" &&

function calcProgress(p){
  // 착공일 있으면 착공일 기준, 없으면 낙찰일 기준, 둘 다 없으면 준공예정일 1년 전 기준
  if(!p.expectedCompletionDate) return null;
  const end = new Date(p.expectedCompletionDate).getTime();
  const now = Date.now();
  let start;
  if(p.startDate) {
    start = new Date(p.startDate).getTime();
  } else if(p.bidConfirmDate) {
    start = new Date(p.bidConfirmDate).getTime();
  } else {
    start = end - 365*24*60*60*1000; // 준공예정일 1년 전 추정
  }
  if(end <= start) return null;
  const pct = Math.min(100, Math.max(0, Math.round((now - start) / (end - start) * 100)));
  return pct;
}

function renderProjectsList(){
  const listEl = document.getElementById("proj-list-area");
  if(!listEl){ renderProjects(); return; }

  // ── 필터 ──
  let data = projects.filter(p=>{
    if(projFilterStatus!=='전체' && p.status!==projFilterStatus) return false;
    if(projFilterType!=='전체' && p.constructionType!==projFilterType) return false;
    if(projFilterYear!=='전체' && (p.bidConfirmDate||'').slice(0,4)!==projFilterYear) return false;
    if(projFilterFlag && p.guideSentDate) return false;
    if(projFilterFlag && p.constructionType!=='기술자재형') return false;
    if(projectSearch && !p.customerName.includes(projectSearch) && !(p.aptName&&p.aptName.includes(projectSearch))) return false;
    return true;
  });

  // ── 정렬 ──
  if(projSortKey==='end') data.sort((a,b)=>(a.expectedCompletionDate||'').localeCompare(b.expectedCompletionDate||''));
  else if(projSortKey==='apt') data.sort((a,b)=>(a.aptName||'').localeCompare(b.aptName||'','ko'));
  else if(projSortKey==='bid') data.sort((a,b)=>(b.bidPrice||0)-(a.bidPrice||0));

  const total = data.length;
  const totalPages = Math.max(1, Math.ceil(total/PROJ_PAGE_SIZE));
  projPage = Math.min(projPage, totalPages);
  const paged = data.slice((projPage-1)*PROJ_PAGE_SIZE, projPage*PROJ_PAGE_SIZE);

  let html="";
  if(projects.length===0){
    html=`<div class="info-box info-blue" style="text-align:center;padding:24px">등록된 현장이 없습니다.<br><span style="font-size:12px">위 버튼으로 등록하거나 엑셀 가져오기를 이용하세요.</span></div>`;
  } else if(total===0){
    html=`<div class="info-box info-yellow" style="text-align:center;padding:20px">검색/필터 결과가 없습니다.</div>`;
  } else {
    // 요약
    html+=`<div style="font-size:11px;color:#9ca3af;margin-bottom:8px">
      ${projectSearch?`"${projectSearch}" 검색결과 `:""}<strong style="color:#374151">${total}건</strong>
      · <span style="color:#4338ca">${(projPage-1)*PROJ_PAGE_SIZE+1}~${Math.min(projPage*PROJ_PAGE_SIZE,total)}번째</span> 표시
      · 페이지 <strong>${projPage}/${totalPages}</strong>
    </div>`;

    if(projViewMode==='list'){
      // ── 리스트뷰 ──
      const typeColors={"공고":"#6b7280","기술자재형":"#7c3aed","자재판매형":"#ea580c","컨설팅":"#2563eb","기타":"#16a34a"};
      const statColors={"진행중":"#1d4ed8","완료":"#15803d","대기":"#6b7280","유찰":"#c2410c","취소":"#dc2626"};
      html+=`<div style="overflow-x:auto"><table class="proj-list-table"><thead><tr>
        <th>공사형태</th><th>공종</th><th>아파트명</th><th>고객사명</th>
        <th style="text-align:right">낙찰가</th><th>준공일</th><th>상태</th><th>안내문</th><th>액션</th><th>삭제</th>
      </tr></thead><tbody>`;
      paged.forEach((p,i)=>{
        const flag = p.constructionType==='기술자재형'&&!p.guideSentDate ? '🚩 ' : '';
        html+=`<tr>
          <td><span style="color:${typeColors[p.constructionType]||'#374151'};font-weight:600;font-size:11px">${p.constructionType||'-'}</span></td>
          <td>${p.category||'-'}</td>

          <td style="text-align:center">${p.constructionType==='기술자재형'?(p.guideSentDate?'✅':'🚩'):'-'}</td>

        </tr>`;

    } else {
      // ── 카드뷰 (공사형태별 그룹) ──
      const groupDef=[
        {key:"공고",cls:"gh-etc",icon:"⬜"},
        {key:"컨설팅",cls:"gh-consulting",icon:"🔵"},
        {key:"기술자재형",cls:"gh-tech",icon:"🟣"},
        {key:"자재판매형",cls:"gh-material",icon:"🟠"},
        {key:"기타",cls:"gh-etc",icon:"🟢"},
      ];
      const knownTypes=groupDef.map(g=>g.key);
      const allGroups=[...groupDef, ...([...new Set(paged.map(p=>p.constructionType).filter(t=>!knownTypes.includes(t)))].map(t=>({key:t,cls:"gh-etc",icon:"🟢"})))];
      allGroups.forEach(g=>{
        const grp=paged.filter(p=>p.constructionType===g.key);
        if(!grp.length) return;
        const totalInGroup=data.filter(p=>p.constructionType===g.key).length;
        html+=`<div class="group-header ${g.cls}">${g.icon} ${g.key}<span class="group-count">${totalInGroup}건</span></div>`;
        html+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:8px;margin-bottom:6px">`;
        grp.forEach(p=>{ html+=renderProjectCard(p); });
        html+=`</div>`;
      });
    }

    // ── 페이지네이션 ──
    if(totalPages>1){
      html+=`<div class="proj-pagination">`;
      html+=`<button class="ppage" onclick="goProjPage(${Math.max(1,projPage-1)})">‹</button>`;
      for(let i=1;i<=totalPages;i++){
        if(i===1||i===totalPages||Math.abs(i-projPage)<=1){
          html+=`<button class="ppage${projPage===i?' active':''}" onclick="goProjPage(${i})">${i}</button>`;
        } else if(Math.abs(i-projPage)===2){
          html+=`<span class="ppage ellipsis">…</span>`;
        }
      }
      html+=`<button class="ppage" onclick="goProjPage(${Math.min(totalPages,projPage+1)})">›</button>`;
      html+=`<span style="font-size:11px;color:#9ca3af;margin-left:6px">${PROJ_PAGE_SIZE}건/페이지</span></div>`;
    }
  }

  listEl.innerHTML=html;
  updateCompletedTabBadge();
}

function goProjPage(n){ projPage=n; renderProjectsList(); const el=document.getElementById("proj-list-area"); if(el) el.scrollIntoView({behavior:"smooth",block:"start"}); }

function deleteProject(pid){
  const p = projects.find(x=>x.id===pid);
  if(!p) return;
  const relatedBills = allBills.filter(x=>x.projectId===pid);
  // 스택에 저장
  undoStack.push({type:"deleteProject", project:JSON.parse(JSON.stringify(p)), bills:JSON.parse(JSON.stringify(relatedBills))});
  if(undoStack.length>10) undoStack.shift();
  projects = projects.filter(x=>x.id!==pid);
  allBills  = allBills.filter(x=>x.projectId!==pid);
  saveData();
  renderProjects();
  showUndoToast(`"${p.aptName||p.customerName}" 현장이 삭제되었습니다.`);
}

function undoLast(){
  const action = undoStack.pop();
  if(!action){ showUndoToast("되돌릴 작업이 없습니다.", true); return; }
  if(action.type==="deleteProject"){
    projects.push(action.project);
    allBills.push(...action.bills);
    saveData();
    renderPage(currentTab);
    showUndoToast(`"${action.project.aptName||action.project.customerName}" 현장이 복원되었습니다.`, true);
  }
}

let _undoToastTimer = null;
function showUndoToast(msg, isRestore=false){
  let t = document.getElementById("undo-toast");
  if(!t){
    t = document.createElement("div");
    t.id = "undo-toast";
    t.style.cssText = "position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;display:flex;align-items:center;gap:10px;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.25);transition:opacity .25s;white-space:nowrap";
    document.body.appendChild(t);
  }
  t.innerHTML = isRestore
    ? `<span>✅ ${msg}</span>`
    : `<span>🗑️ ${msg}</span><button onclick="undoLast()" style="background:#4338ca;color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">실행취소</button>`;
  t.style.opacity = "1";
  if(_undoToastTimer) clearTimeout(_undoToastTimer);
  _undoToastTimer = setTimeout(()=>{ t.style.opacity="0"; }, isRestore?2000:5000);
}

// ══════════ 자재 주문 v3 ══════════
let ordFilter = "all";      // all | patent | noinv | nodep | late | done
let ordSearch = "";
let ordExpandedIds = new Set();
let ordShowCompleted = false;
let ordPopPid = null, ordPopOid = null, ordPopField = null;
let ordBillPid = null;
let ordInlineAddPid = null;

// 날짜 → 오늘과의 일수 차이
const ordDfToday = d => { if(!d) return null; const dt=new Date(d); if(isNaN(dt.getTime())) return null; return Math.round((new Date(todayStr())-dt)/86400000); };
// 날짜 → M/D 형식
const ordFmt = d => { if(!d) return null; const dt=new Date(d); if(isNaN(dt.getTime())) return "-"; return `${dt.getMonth()+1}/${dt.getDate()}`; };
// 금액 포맷 (원 없이)
const ordFmtN = n => Number(n).toLocaleString("ko-KR");
const ordFmtAmt = n => n ? ordFmtN(n)+"원" : "-";

function ordCalc(p){
  const totalAmt = p.orders.reduce((a,o)=>a+(Number(o.amount)||0),0);
  const threshold = (Number(p.bidPrice)||0)*0.02;
  const pct = p.bidPrice>0 ? totalAmt/p.bidPrice*100 : 0;
  const showBar = p.constructionType==="기술자재형"||p.constructionType==="자재판매형";
  const hasPatent = showBar && totalAmt < threshold;
  const patentFee = hasPatent ? Math.round((threshold-totalAmt)/2) : 0;
  const validOrds = p.orders.filter(o=>Number(o.amount)>0);
  const noInv = validOrds.some(o=>!o.invoiceDate);
  const noDep = validOrds.some(o=>o.invoiceDate&&!o.depositDate);
  const late  = validOrds.some(o=>o.invoiceDate&&!o.depositDate&&ordDfToday(o.invoiceDate)>=30);
  const allDone = validOrds.length>0 && validOrds.every(o=>o.invoiceDate&&o.depositDate);
  return {totalAmt, threshold, pct, showBar, hasPatent, patentFee, noInv, noDep, late, allDone};
}

function ordGetFiltered(){
  const base = projects.filter(p => ordShowCompleted || p.status !== "완료");
  let data = ordSearch
    ? base.filter(p=>(p.aptName||"").includes(ordSearch)||(p.customerName||"").includes(ordSearch))
    : base;
  data = data.filter(p => (p.orders && p.orders.length > 0) || p.id === ordInlineAddPid);
  data = data.filter(p => p.id === ordInlineAddPid || (p.constructionType !== "컨설팅" && p.constructionType !== "기타" && p.constructionType !== "공고"));
  data = data.filter(p => p.id === ordInlineAddPid || (p.status !== "유찰" && p.status !== "취소"));
  if(ordFilter==="patent") data=data.filter(p=>p.id===ordInlineAddPid||ordCalc(p).hasPatent);
  else if(ordFilter==="noinv") data=data.filter(p=>{if(p.id===ordInlineAddPid)return true;const c=ordCalc(p);return c.noInv&&p.orders.some(o=>Number(o.amount)>0);});
  else if(ordFilter==="nodep") data=data.filter(p=>p.id===ordInlineAddPid||ordCalc(p).noDep);
  else if(ordFilter==="late")  data=data.filter(p=>p.id===ordInlineAddPid||ordCalc(p).late);
  else if(ordFilter==="done")  data=data.filter(p=>p.id===ordInlineAddPid||ordCalc(p).allDone);
  return data;
}

function ordDateSummaryHTML(p){
  const ords = p.orders.filter(o=>Number(o.amount)>0||o.invoiceDate);
  if(!ords.length) return `<div class="ds2-wrap"><span class="ds-chip2 ds2-wait">주문 없음</span></div>`;
  let noInv=0,noDep=0,late=0,done=0;
  ords.forEach(o=>{
    if(!o.invoiceDate) noInv++;
    else if(!o.depositDate){ const d=ordDfToday(o.invoiceDate); if(d>=30) late++; else noDep++; }
    else done++;
  });
  const chips=[];
  if(done>0)  chips.push(`<span class="ds-chip2 ds2-ok">✅ 완료 ${done}건</span>`);
  if(noInv>0) chips.push(`<span class="ds-chip2 ds2-wait">🧾 미발행 ${noInv}건</span>`);
  if(noDep>0) chips.push(`<span class="ds-chip2 ds2-warn">💳 대기 ${noDep}건</span>`);
  if(late>0)  chips.push(`<span class="ds-chip2 ds2-late">🔴 지연 ${late}건</span>`);
  return `<div class="ds2-wrap">${chips.join("")}</div>`;
}

// ── 자재주문 헬퍼 ──
function ordQuickSearch(val){
  const dd = document.getElementById('ord-quick-dropdown');
  if(!dd) return;
  const q = val.trim();
  if(q.length < 2){ dd.style.display='none'; return; }
  const matches = projects.filter(p => p.status !== '완료' &&
    ((p.aptName||'').includes(q)||(p.customerName||'').includes(q)));
  if(!matches.length){ dd.innerHTML=`<div style="padding:10px 14px;font-size:12px;color:var(--gray-400)">검색 결과 없음</div>`; dd.style.display='block'; return; }
  dd.innerHTML = matches.map(p=>`
    <div onmousedown="ordQuickSelect(${p.id})" style="padding:8px 14px;cursor:pointer;font-size:12px;border-bottom:1px solid #f3f4f6" onmouseover="this.style.background='#eef2ff'" onmouseout="this.style.background=''">
      <b style="color:var(--indigo)">${p.aptName||p.customerName}</b>${p.aptName?` <span style="color:var(--gray-400);font-size:11px">${p.customerName}</span>`:''}
    </div>`).join('');
  dd.style.display='block';
}
function ordQuickSelect(pid){
  const p = projects.find(x=>x.id===pid);
  if(!p) return;
  const inp = document.getElementById('ord-quick-input');
  if(inp) inp.value='';
  const dd = document.getElementById('ord-quick-dropdown');
  if(dd) dd.style.display='none';
  ordExpandedIds.add(pid);
  ordInlineAddPid = pid;
  renderOrders();
  setTimeout(()=>{ const el=document.getElementById(`oos-${pid}`); if(el) el.scrollIntoView({behavior:'smooth',block:'center'}); },100);
}
document.addEventListener('click', e=>{
  const dd=document.getElementById('ord-quick-dropdown');
  if(dd && !dd.contains(e.target) && e.target.id!=='ord-quick-input') dd.style.display='none';
});

let _ordSearchTimer = null;
function ordSearchInput(val){
  ordSearch = val;
  clearTimeout(_ordSearchTimer);
  _ordSearchTimer = setTimeout(renderOrders, 250);
}
function ordSetFilter(mode){
  ordFilter = mode;
  renderOrders();
}

function ordToggleExpand(id){
  if(ordExpandedIds.has(id)) ordExpandedIds.delete(id);
  else ordExpandedIds.add(id);
  renderOrders();
}

function ordShowInlineAdd(pid){
  ordInlineAddPid = pid;
  renderOrders();
  setTimeout(()=>{const el=document.getElementById(`oi-date-${pid}`);if(el)el.focus();},50);
}
function ordHideInlineAdd(){
  ordInlineAddPid = null;
  renderOrders();
}
function ordSaveInlineAdd(pid){
  const date = (document.getElementById(`oi-date-${pid}`)||{}).value||"";
  const amount = Number((document.getElementById(`oi-amt-${pid}`)||{}).value||0);
  const invoiceDate = (document.getElementById(`oi-inv-${pid}`)||{}).value||"";
  const depositDate = (document.getElementById(`oi-dep-${pid}`)||{}).value||"";
  if(!date||!amount) return alert("주문일과 금액을 입력하세요.");
  const p = projects.find(x=>x.id===pid);
  if(!p) return;
  p.orders.push({id:Date.now(),date,item:"자재",qty:1,unitPrice:amount,amount,invoiceDate,depositDate});
  p.orders.sort((a,b)=>(a.date||"")<(b.date||"")?-1:(a.date||"")>(b.date||"")?1:0);
  ordInlineAddPid = null;
  ordExpandedIds.delete(pid);
  saveData();
  renderPage(currentTab);
}

// 팝오버 (날짜 수정)
document.addEventListener("click", e => {
  const pop = document.getElementById("ord-popover");
  if(!pop || !pop.classList.contains("open")) return;
  if(!pop.contains(e.target) && !e.target.closest(".oev2")) ordClosePop();
});

function ordOpenPop(e, pid, oid, field, label, cur){
  e.stopPropagation();
  ordPopPid = pid; ordPopOid = oid; ordPopField = field;
  document.getElementById("ord-pop-lbl").textContent = `📅 ${label} 입력`;
  document.getElementById("ord-pop-date").value = cur || "";
  const pop = document.getElementById("ord-popover");
  const rect = e.currentTarget.getBoundingClientRect();
  let l = rect.left, t = rect.bottom + 5;
  if(l+220 > window.innerWidth) l = window.innerWidth - 225;
  if(t+140 > window.innerHeight) t = rect.top - 145;
  pop.style.left = l+"px"; pop.style.top = t+"px";
  pop.classList.add("open");
  document.getElementById("ord-pop-date").focus();
}
function ordSavePop(){
  if(ordPopPid===null) return;
  const p = projects.find(x=>x.id===ordPopPid);
  const o = p?.orders.find(x=>x.id===ordPopOid);
  if(o) o[ordPopField] = document.getElementById("ord-pop-date").value || null;
  saveData();
  ordClosePop();
  renderOrders();
}
function ordClearPop(){
  if(ordPopPid===null) return;
  const p = projects.find(x=>x.id===ordPopPid);
  const o = p?.orders.find(x=>x.id===ordPopOid);
  if(o) o[ordPopField] = null;
  saveData();
  ordClosePop();
  renderOrders();
}
function ordClosePop(){
  document.getElementById("ord-popover")?.classList.remove("open");
  ordPopPid = null; ordPopOid = null; ordPopField = null;
}

// ── 청구서 발행 ──
let billingSearch = "";
let billingFilter = "all"; // "all" | "material" | "patent"
let billingShowCompleted = false; // 청구서 탭: 완료현장 표시 여부

function renderBilling(){
  // 청구 가능한 현장만 (금액 > 0) + 기본적으로 완료현장 제외
  const billable = projects.filter(p => {
    const b = calcBilling(p);
    return (b.materialAmt > 0 || b.patentAmt > 0) && (billingShowCompleted || p.status !== "완료");
  });
  const completedBillable = projects.filter(p => {
    const b = calcBilling(p);
    return (b.materialAmt > 0 || b.patentAmt > 0) && p.status === "완료";
  }).length;

  // 검색 + 필터 적용
  let filtered = billable;
  if(billingSearch) filtered = filtered.filter(p => p.customerName.includes(billingSearch) || (p.aptName && p.aptName.includes(billingSearch)));
  if(billingFilter === "material") filtered = filtered.filter(p => calcBilling(p).materialAmt > 0);
  if(billingFilter === "patent")   filtered = filtered.filter(p => calcBilling(p).patentAmt > 0);

  const btnBase = "padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:500;font-family:inherit;";
  const btnActive = btnBase + "background:#4338ca;color:#fff;";
  const btnInactive = btnBase + "background:#f3f4f6;color:#6b7280;";

  let html = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <p class="sec-title" style="margin:0">🧾 청구서 발행</p>
    <span style="font-size:11px;color:#9ca3af">청구 가능 ${billable.length}건</span>
  </div>
  <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px">
    <input type="text" id="billing-search-input" value="${billingSearch}"
      style="width:100%;border:1px solid #d1d5db;border-radius:8px;padding:8px 14px;font-size:13px;font-family:inherit;outline:none"
      placeholder="🔍 고객사명 또는 아파트명 검색..."
      oninput="billingSearch=this.value;renderBillingList()"/>
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
      <button style="${billingFilter==='all'?btnActive:btnInactive}" onclick="billingFilter='all';renderBillingList()">전체</button>
      <button style="${billingFilter==='material'?btnActive:btnInactive}" onclick="billingFilter='material';renderBillingList()">💰 자재대금</button>
      <button style="${billingFilter==='patent'?btnActive:btnInactive}" onclick="billingFilter='patent';renderBillingList()">🔖 특허료</button>
      <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:12px;color:#374151;user-select:none;margin-left:6px;padding:6px 10px;background:#f9fafb;border-radius:8px;border:1px solid #e5e7eb">
        <input type="checkbox" ${billingShowCompleted?"checked":""} onchange="billingShowCompleted=this.checked;renderBilling()" style="width:13px;height:13px;cursor:pointer"/>
        완료현장 포함
        ${completedBillable>0?`<span style="font-size:10px;color:#16a34a">(${completedBillable}건)</span>`:""}
      </label>
    </div>
  </div>
  <div id="billing-list-area"></div>`;

  document.getElementById("page-3").innerHTML = html;
  renderBillingList();
}

function renderBillingList(){
  const billable = projects.filter(p => {
    const b = calcBilling(p);
    return (b.materialAmt > 0 || b.patentAmt > 0) && (billingShowCompleted || p.status !== "완료");
  });

  let filtered = billable;
  if(billingSearch) filtered = filtered.filter(p => p.customerName.includes(billingSearch) || (p.aptName && p.aptName.includes(billingSearch)));
  if(billingFilter === "material") filtered = filtered.filter(p => calcBilling(p).materialAmt > 0);
  if(billingFilter === "patent")   filtered = filtered.filter(p => calcBilling(p).patentAmt > 0);

  const el = document.getElementById("billing-list-area");
  if(!el) return;

  if(projects.length === 0){
    el.innerHTML = `<div class="info-box info-blue" style="text-align:center;padding:20px">등록된 현장이 없습니다.</div>`;
    return;
  }
  if(filtered.length === 0){
    el.innerHTML = `<div class="info-box info-yellow" style="text-align:center;padding:16px">
      ${billingSearch ? `"${billingSearch}" 검색 결과가 없습니다.` : "조건에 맞는 청구 대상이 없습니다."}
    </div>`;
    return;
  }

  // 이미 발행된 청구서 타입을 현장별로 수집 (미수금/계산서발행 포함, 수금완료도 포함)
  const issuedTypeMap = {};
  allBills.forEach(b=>{
    if(!issuedTypeMap[b.projectId]) issuedTypeMap[b.projectId]=new Set();
    issuedTypeMap[b.projectId].add(b.type);
  });

  // 발행 가능한 유형이 하나라도 남아있는 현장만 표시
  const displayFiltered = filtered.filter(p=>{
    const b = calcBilling(p);
    const issued = issuedTypeMap[p.id] || new Set();
    const materialPending = b.materialAmt > 0 && !issued.has("자재대금");
    const patentPending   = b.patentAmt   > 0 && !issued.has("특허료");
    const execPending     = (p.constructionType==="컨설팅"||p.constructionType==="기타"||p.constructionType==="공고") && b.materialAmt > 0 && !issued.has("자재대금");
    return materialPending || patentPending || execPending;
  });

  let html = `<div style="font-size:11px;color:#9ca3af;margin-bottom:8px">${displayFiltered.length}건 표시 중</div>`;
  displayFiltered.forEach(p => {
    const b = calcBilling(p);
    const dl = daysLeft(p.expectedCompletionDate);
    const isExec = p.constructionType === "컨설팅" || p.constructionType === "기타" || p.constructionType === "공고";
    const issued = issuedTypeMap[p.id] || new Set();
    const materialPending = b.materialAmt > 0 && !issued.has("자재대금");
    const patentPending   = b.patentAmt   > 0 && !issued.has("특허료");
    html += `<div class="card" style="${p.status==='완료'?'border-left:4px solid #4ade80;opacity:0.85':''}">
      <div class="proj-header">
        <div>
          <div class="proj-name">${p.customerName}</div>
          <div class="proj-sub">${p.aptName||""} ${p.constructionName?`· ${p.constructionName}`:""}</div>
        </div>
        ${badge(p.constructionType,typeColor(p.constructionType))}
      </div>
      <div class="bill-box">
        <div class="bill-row"><span class="lbl">낙찰가</span><span class="val">${fmtNum(p.bidPrice)}</span></div>
        ${!isExec?`<div class="bill-row"><span class="lbl">2% 기준액</span><span class="val">${fmtNum(p.bidPrice*0.02)}</span></div>`:""}
        ${materialPending?`<div class="bill-row"><span class="lbl">자재대금</span><span class="val" style="color:#1d4ed8;font-weight:600">${fmtNum(b.materialAmt)}</span></div>`:""}
        ${patentPending?`<div class="bill-row"><span class="lbl">특허료</span><span class="val" style="color:#7c3aed;font-weight:600">${fmtNum(b.patentAmt)}</span></div>`:""}
        <div class="bill-row total"><span>청구 예정</span><span class="val">${fmtNum((materialPending?b.materialAmt:0)+(patentPending?b.patentAmt:0))}</span></div>
      </div>
      ${dl!==null?`<div class="info-box ${dl<=7?'info-yellow':'info-gray'}" style="margin-bottom:10px">📅 준공예정: ${p.expectedCompletionDate} (${dl>=0?`D-${dl}`:`D+${Math.abs(dl)}`})</div>`:""}
      ${isExec?`
        <div class="btn-row">
          <button class="btn btn-primary" style="flex:1" onclick="openBillPreview(${p.id},'material')">📄 자재대금 청구 (준공)</button>
          <button class="btn btn-gray" onclick="printBill(${p.id})">🖨️ PDF</button>
        </div>`:`
        <div class="btn-row">
          ${materialPending?`<button class="btn btn-blue" style="flex:1" onclick="openBillPreview(${p.id},'material')">📄 자재대금 청구 (월)</button>`:""}
          ${patentPending?`<button class="btn btn-purple" style="flex:1" onclick="openBillPreview(${p.id},'patent')">📄 특허료 청구 (준공)</button>`:""}
        </div>
        <button class="btn btn-gray btn-full" style="margin-top:6px" onclick="printBill(${p.id})">🖨️ PDF 출력</button>`}
    </div>`;
  });
  el.innerHTML = html;
}

// ── 미수금 관리 ──
function renderUnpaid(){
  // 청구서 기반 미수금
  const billUnpaid = allBills.filter(b => b.status !== "수금완료");

  // 자재주문 계산서 발행됐지만 입금 안 된 건 → 아파트(현장)별로 그룹핑
  const orderUnpaidMap = {};
  projects.forEach(p => {
    p.orders.forEach(o => {
      if(o.invoiceDate && !o.depositDate){
        const key = p.id;
        if(!orderUnpaidMap[key]){
          orderUnpaidMap[key] = {
            _type:"order", projectId:p.id,
            customerName:p.customerName, aptName:p.aptName,
            constructionType:p.constructionType, constructionName:p.constructionName,
            contactEmail:p.contactEmail,
            totalAmount:0, orders:[],
            latestInvoiceDate:"",
          };
        }
        orderUnpaidMap[key].totalAmount += o.amount;
        orderUnpaidMap[key].orders.push(o);
        // 가장 최근 계산서 발행일 추적
        if(!orderUnpaidMap[key].latestInvoiceDate || o.invoiceDate > orderUnpaidMap[key].latestInvoiceDate){
          orderUnpaidMap[key].latestInvoiceDate = o.invoiceDate;
        }
      }
    });
  });
  const orderUnpaid = Object.values(orderUnpaidMap);

  const allUnpaidItems = [...billUnpaid.map(b=>({...b,_type:"bill"})), ...orderUnpaid];

  if(allUnpaidItems.length===0 && allBills.length===0 && orderUnpaid.length===0){
    document.getElementById("page-4").innerHTML=`<div style="text-align:center;padding:60px 0;color:#9ca3af"><div style="font-size:40px">📭</div><p style="margin-top:12px">발행된 청구서가 없습니다.</p></div>`;
    return;
  }

  const totalAmt = allBills.reduce((s,b)=>s+b.amount,0) + orderUnpaid.reduce((s,o)=>s+o.totalAmount,0);
  const unpaidAmt = billUnpaid.reduce((s,b)=>s+b.amount,0) + orderUnpaid.reduce((s,o)=>s+o.totalAmount,0);
  const paidAmt   = allBills.filter(b=>b.status==="수금완료").reduce((s,b)=>s+b.amount,0);

  let html=`<p class="sec-title">💰 미수금 관리</p>
  <div class="grid-3">
    <div class="stat-card" style="text-align:center"><div class="label">전체 청구</div><div class="value v-gray">${fmtNum(totalAmt)}</div></div>
    <div class="stat-card" style="text-align:center"><div class="label">미수금</div><div class="value ${unpaidAmt>0?"v-red":"v-gray"}">${fmtNum(unpaidAmt)}</div></div>
    <div class="stat-card" style="text-align:center"><div class="label">수금 완료</div><div class="value v-green">${fmtNum(paidAmt)}</div></div>
  </div>`;

  if(allUnpaidItems.length===0){
    html+=`<div class="info-box info-green" style="text-align:center;padding:16px">✅ 모든 청구가 수금 완료되었습니다.</div>`;
  } else {
    html+=`<p class="sec-title">⚠️ 미수금 내역 (${allUnpaidItems.length}건)</p>`;
    allUnpaidItems.forEach(item=>{
      if(item._type==="order"){
        const ageDaysO = item.latestInvoiceDate ? Math.floor((Date.now()-new Date(item.latestInvoiceDate).getTime())/86400000) : null;
        const ageColorO = ageDaysO===null?'#9ca3af':ageDaysO>=60?'#dc2626':ageDaysO>=30?'#f97316':'#ca8a04';
        const ageLabelO = ageDaysO===null?'':ageDaysO===0?'발행당일':`+${ageDaysO}일 경과`;
        // 주문 건수가 여러 개면 상세 목록 표시
        const orderDetailRows = item.orders.map(o=>`
          <tr>
            <td style="padding:3px 6px;font-size:11px;color:#374151">${o.invoiceDate}</td>
            <td style="padding:3px 6px;font-size:11px;text-align:right;color:#4338ca;font-weight:600">${fmtNum(o.amount)}</td>
          </tr>`).join("");
        const detailTable = item.orders.length>1 ? `
          <div style="margin:8px 0 4px;background:#f9fafb;border-radius:6px;overflow:hidden">
            <table style="width:100%;border-collapse:collapse">
              <thead><tr>
                <th style="padding:4px 6px;font-size:10px;color:#6b7280;text-align:left;background:#f3f4f6">계산서발행일</th>
                <th style="padding:4px 6px;font-size:10px;color:#6b7280;text-align:right;background:#f3f4f6">금액</th>
              </tr></thead>
              <tbody>${orderDetailRows}</tbody>
            </table>
          </div>` : "";
        html+=`<div class="unpaid-card" style="border-left-color:${ageColorO}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
            <div>
              <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:2px">
                ${badge(item.constructionType,typeColor(item.constructionType))}
                ${badge("자재계산서","b-orange")}
                <strong style="font-size:13px">${item.aptName||item.customerName}</strong>
              </div>
              <div style="font-size:11px;color:#6b7280">${item.aptName?item.customerName+'　·　':''}${item.orders.length}건 · 최근 발행일: ${item.latestInvoiceDate}</div>
            </div>
            <div style="text-align:right">
              <div style="font-weight:700;color:#4338ca;margin-bottom:3px">${fmtNum(item.totalAmount)}</div>
              ${badge("미입금","b-red")}
              ${ageDaysO!==null?`<div style="font-size:11px;font-weight:700;color:${ageColorO};margin-top:4px">${ageLabelO}</div>`:''}
            </div>
          </div>
          ${detailTable}
        </div>`;
      } else {
        const stBadge=item.status==="계산서발행"?"b-yellow":"b-red";
        const typeBadge=item.type==="특허료"?"b-patent":item.type==="자재대금"?"b-blue":"b-blue";
        const refDate = item.invoiceDate || item.issuedDate;
        const ageDaysB = refDate ? Math.floor((Date.now()-new Date(refDate).getTime())/86400000) : null;
        const ageColorB = ageDaysB===null?'#9ca3af':ageDaysB>=60?'#dc2626':ageDaysB>=30?'#f97316':'#ca8a04';
        const ageLabelB = ageDaysB===null?'계산서 미발행':ageDaysB===0?'발행당일':`+${ageDaysB}일 경과`;
        html+=`<div class="unpaid-card" style="border-left-color:${ageColorB}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
            <div>
              <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:2px">
                ${badge(item.constructionType,typeColor(item.constructionType))}
                ${item.type?badge(item.type,typeBadge):""}
                ${(()=>{const p=projects.find(x=>x.id===item.projectId);return p&&p.creditGrade?creditBadge(p.creditGrade):"";})()}
                <strong style="font-size:13px">${item.aptName||item.customerName}</strong>

              <option value="담당자 부재·연락두절" ${(item.delayReason||"")==="담당자 부재·연락두절"?"selected":""}>담당자 부재·연락두절</option>
              <option value="계산서 수령 미확인" ${(item.delayReason||"")==="계산서 수령 미확인"?"selected":""}>계산서 수령 미확인</option>
              <option value="공사 하자 클레임" ${(item.delayReason||"")==="공사 하자 클레임"?"selected":""}>공사 하자 클레임</option>
              <option value="고객사 내부 결재 지연" ${(item.delayReason||"")==="고객사 내부 결재 지연"?"selected":""}>고객사 내부 결재 지연</option>
              <option value="세금계산서 미발행(우리측)" ${(item.delayReason||"")==="세금계산서 미발행(우리측)"?"selected":""}>세금계산서 미발행(우리측)</option>
              <option value="기타" ${(item.delayReason||"")==="기타"?"selected":""}>기타</option>
            </select>
            ${(item.delayReason||"")==="기타"?`<input type="text" value="${item.delayReasonNote||""}" placeholder="기타 사유 직접 입력..." onchange="updateBillDelayReason(${item.id},'note',this.value)" style="margin-top:5px;width:100%;border:1px solid #fca5a5;border-radius:8px;padding:7px 10px;font-size:12px;font-family:inherit;box-sizing:border-box"/>`:``}
          </div>
          <div class="btn-row">
            <button class="btn btn-orange" style="flex:1" onclick="openDunningEmail(${item.id})">✉️ 독촉 이메일</button>
            <button class="btn btn-gray" style="flex:1" onclick="printBillById(${item.id})">🖨️ PDF 재출력</button>
          </div>
        </div>`;
      }
    });
  }

  document.getElementById("page-4").innerHTML=html;
}

function updateBillDelayReason(bid, field, value){
  const b = allBills.find(x=>x.id===bid);
  if(!b) return;
  if(field==="reason"){
    b.delayReason = value;
    if(value!=="기타") b.delayReasonNote = "";
  } else if(field==="note"){
    b.delayReasonNote = value;
  }
  saveData();
  renderUnpaid();
}

function updateOrderDepositDate(pid,oid,value){
  const p=projects.find(x=>x.id===pid);if(!p)return;
  const o=p.orders.find(x=>x.id===oid);if(!o)return;
  o.depositDate=value;
  saveData();
  renderUnpaid();
}

// 아파트(현장) 내 미입금 자재주문 전체에 입금일 일괄 적용
function updateAllOrdersDepositDate(pid, value){
  const p=projects.find(x=>x.id===pid);if(!p)return;
  p.orders.forEach(o=>{
    if(o.invoiceDate && !o.depositDate){
      o.depositDate=value;
    }
  });
  saveData();
  renderUnpaid();
}

      </div>

        <button onclick="cancelBill(${b.id})" style="margin-top:6px;padding:3px 10px;font-size:11px;border:1px solid #fca5a5;border-radius:6px;background:#fff;color:#dc2626;cursor:pointer;font-family:inherit">🗑️ 발행취소</button>

function cancelBill(bid){
  const b = allBills.find(x=>x.id===bid);
  if(!b) return;
  const label = `${b.aptName||b.customerName} · ${b.type} (${fmtNum(b.amount)})`;
  if(!confirm(`아래 청구서 발행을 취소하시겠습니까?\n\n${label}\n\n취소하면 발행이력에서 삭제되고\n청구서 발행 탭에 다시 표시됩니다.`)) return;
  // allBills에서 제거
  allBills = allBills.filter(x=>x.id!==bid);
  // 각 프로젝트의 bills 배열에서도 제거
  projects.forEach(p=>{ if(p.bills) p.bills = p.bills.filter(x=>x.id!==bid); });
  saveData();
  renderPage(currentTab);
}

// ── 연간 분석 리포트 ──
function downloadAnnualReport(){
  if(allBills.length===0 && projects.every(p=>p.orders.length===0)){
    alert("분석할 데이터가 없습니다.");return;
  }
  const wb = XLSX.utils.book_new();
  const year = new Date().getFullYear();

  /* ── 시트1: 종합 요약 ── */
  const totalBillAmt   = allBills.reduce((s,b)=>s+b.amount,0);
  const paidBillAmt    = allBills.filter(b=>b.status==="수금완료").reduce((s,b)=>s+b.amount,0);
  const unpaidBillAmt  = totalBillAmt - paidBillAmt;
  const recoveryRate   = totalBillAmt>0 ? (paidBillAmt/totalBillAmt*100).toFixed(1) : 0;
  // 평균 회수기간 (계산서발행일→입금일)
  const recoveredBills = allBills.filter(b=>b.status==="수금완료"&&b.invoiceDate&&b.depositDate);
  const avgDays = recoveredBills.length>0
    ? Math.round(recoveredBills.reduce((s,b)=>s+Math.floor((new Date(b.depositDate)-new Date(b.invoiceDate))/86400000),0)/recoveredBills.length)
    : "-";
  // 자재주문 미수금
  const orderUnpaidAmt = projects.reduce((s,p)=>s+p.orders.filter(o=>o.invoiceDate&&!o.depositDate).reduce((ss,o)=>ss+o.amount,0),0);
  const totalUnpaid    = unpaidBillAmt + orderUnpaidAmt;

  const s1rows = [
    [`${year}년 대금관리 종합 요약`,"",""],
    ["항목","수치","비고"],
    ["전체 청구 금액",totalBillAmt,"원"],
    ["수금 완료 금액",paidBillAmt,"원"],
    ["미수금 (청구서)",unpaidBillAmt,"원"],
    ["미수금 (자재계산서)",orderUnpaidAmt,"원"],
    ["총 미수금",totalUnpaid,"원"],
    ["대금 회수율",recoveryRate+"%","수금완료÷전체청구"],
    ["평균 회수기간",avgDays==="-"?"-":avgDays+"일","계산서발행→입금"],
    ["총 현장 수",projects.length,"건"],
    ["진행중 현장",projects.filter(p=>p.status==="진행중").length,"건"],
    ["완료 현장",projects.filter(p=>p.status==="완료").length,"건"],
    ["총 청구서 발행",allBills.length,"건"],
    ["수금완료 청구서",allBills.filter(b=>b.status==="수금완료").length,"건"],
  ];
  const ws1 = XLSX.utils.aoa_to_sheet(s1rows);
  ws1["!cols"]=[{wch:22},{wch:18},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws1,"종합요약");

  /* ── 시트2: 지연사유별 분석 ── */
  const unpaidWithReason = allBills.filter(b=>b.status!=="수금완료");
  const reasonMap = {};
  unpaidWithReason.forEach(b=>{
    const r = b.delayReason||(b.delayReason==="기타"&&b.delayReasonNote?b.delayReasonNote:"미입력");
    const reason = b.delayReason ? (b.delayReason==="기타"&&b.delayReasonNote?`기타: ${b.delayReasonNote}`:b.delayReason) : "미입력";
    if(!reasonMap[reason]) reasonMap[reason]={count:0,totalAmt:0,totalDays:0,dayCount:0};
    reasonMap[reason].count++;
    reasonMap[reason].totalAmt+=b.amount;
    const refDate=b.invoiceDate||b.issuedDate;
    if(refDate){
      const d=Math.floor((Date.now()-new Date(refDate).getTime())/86400000);
      reasonMap[reason].totalDays+=d;
      reasonMap[reason].dayCount++;
    }
  });
  const totalReasonCount = unpaidWithReason.length||1;
  const s2rows = [["수금지연 사유별 분석","","","",""],
    ["지연사유","건수","비중(%)","미수금액","평균지연일수"]];
  Object.entries(reasonMap).sort((a,b)=>b[1].count-a[1].count).forEach(([reason,v])=>{
    s2rows.push([reason,v.count,((v.count/totalReasonCount)*100).toFixed(1)+"%",v.totalAmt,v.dayCount>0?Math.round(v.totalDays/v.dayCount)+"일":"-"]);
  });
  const ws2 = XLSX.utils.aoa_to_sheet(s2rows);
  ws2["!cols"]=[{wch:22},{wch:8},{wch:10},{wch:14},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws2,"지연사유분석");

  /* ── 시트3: 공사형태별 집계 ── */
  const ctypes=["공고","컨설팅","기술자재형","자재판매형","기타"];
  const s3rows=[["공사형태별 청구·수금 집계","","","","",""],
    ["공사형태","현장수","총낙찰가","청구금액","수금금액","미수금액"]];
  ctypes.forEach(ct=>{
    const ps=projects.filter(p=>p.constructionType===ct);
    const bs=allBills.filter(b=>b.constructionType===ct);
    s3rows.push([ct,ps.length,ps.reduce((s,p)=>s+p.bidPrice,0),bs.reduce((s,b)=>s+b.amount,0),bs.filter(b=>b.status==="수금완료").reduce((s,b)=>s+b.amount,0),bs.filter(b=>b.status!=="수금완료").reduce((s,b)=>s+b.amount,0)]);
  });
  const ws3=XLSX.utils.aoa_to_sheet(s3rows);
  ws3["!cols"]=[{wch:14},{wch:8},{wch:14},{wch:14},{wch:14},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws3,"공사형태별집계");

  /* ── 시트4: 월별 청구·입금 흐름 ── */
  const monthBill=Array(12).fill(0), monthPaid=Array(12).fill(0), monthUnpaid=Array(12).fill(0);
  allBills.forEach(b=>{
    const m=(b.issuedDate||"").slice(5,7); if(!m)return;
    const mi=parseInt(m)-1; if(mi<0||mi>11)return;
    monthBill[mi]+=b.amount;
    if(b.status==="수금완료") monthPaid[mi]+=b.amount;
    else monthUnpaid[mi]+=b.amount;
  });
  const s4rows=[["월별 청구·입금 흐름","","",""],["월","청구금액","수금금액","미수금액"]];
  for(let i=0;i<12;i++) s4rows.push([`${i+1}월`,monthBill[i],monthPaid[i],monthUnpaid[i]]);
  const ws4=XLSX.utils.aoa_to_sheet(s4rows);
  ws4["!cols"]=[{wch:8},{wch:14},{wch:14},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws4,"월별흐름");

  /* ── 시트5: 미수금 연령 분석 ── */
  const ageBrackets=[{label:"30일 미만",min:0,max:29},{label:"30~60일",min:30,max:60},{label:"61~90일",min:61,max:90},{label:"90일 초과",min:91,max:9999}];
  const ageMap={}; ageBrackets.forEach(b=>{ageMap[b.label]={count:0,amt:0};});
  allBills.filter(b=>b.status!=="수금완료").forEach(b=>{
    const ref=b.invoiceDate||b.issuedDate; if(!ref)return;
    const d=Math.floor((Date.now()-new Date(ref).getTime())/86400000);
    const br=ageBrackets.find(x=>d>=x.min&&d<=x.max);
    if(br){ageMap[br.label].count++;ageMap[br.label].amt+=b.amount;}
  });
  const s5rows=[["미수금 연령 분석","",""],["경과기간","건수","미수금액"]];
  ageBrackets.forEach(b=>s5rows.push([b.label,ageMap[b.label].count,ageMap[b.label].amt]));
  const ws5=XLSX.utils.aoa_to_sheet(s5rows);
  ws5["!cols"]=[{wch:14},{wch:8},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws5,"미수금연령분석");

  /* ── 시트6: 고객사 신용등급별 미수금 ── */
  const gradeMap={A:{count:0,unpaid:0},B:{count:0,unpaid:0},C:{count:0,unpaid:0},신규:{count:0,unpaid:0}};
  projects.forEach(p=>{
    const g=p.creditGrade||"신규";
    const key=gradeMap[g]?g:"신규";
    gradeMap[key].count++;
    const unpaid=allBills.filter(b=>b.projectId===p.id&&b.status!=="수금완료").reduce((s,b)=>s+b.amount,0);
    gradeMap[key].unpaid+=unpaid;
  });
  const s6rows=[["고객사 신용등급별 미수금 현황","",""],["등급","현장수","미수금액"]];
  ["A","B","C","신규"].forEach(g=>s6rows.push([g+"등급",gradeMap[g].count,gradeMap[g].unpaid]));
  const ws6=XLSX.utils.aoa_to_sheet(s6rows);
  ws6["!cols"]=[{wch:12},{wch:8},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws6,"신용등급별미수금");

  /* ── 시트7: 현장별 수금현황 ── */
  const s7rows=[["현장별 수금현황","","","","","",""],
    ["아파트명","고객사","공사형태","신용등급","낙찰가","청구금액","수금금액","미수금액","회수율(%)","평균회수일"]];
  projects.forEach(p=>{
    const bs=allBills.filter(b=>b.projectId===p.id);
    const bAmt=bs.reduce((s,b)=>s+b.amount,0);
    const pAmt=bs.filter(b=>b.status==="수금완료").reduce((s,b)=>s+b.amount,0);
    const uAmt=bAmt-pAmt;
    const rate=bAmt>0?((pAmt/bAmt)*100).toFixed(1)+"%":"-";
    const paidBs=bs.filter(b=>b.status==="수금완료"&&b.invoiceDate&&b.depositDate);
    const avgD=paidBs.length>0?Math.round(paidBs.reduce((s,b)=>s+Math.floor((new Date(b.depositDate)-new Date(b.invoiceDate))/86400000),0)/paidBs.length)+"일":"-";
    s7rows.push([p.aptName||p.customerName,p.customerName,p.constructionType,p.creditGrade||"신규",p.bidPrice,bAmt,pAmt,uAmt,rate,avgD]);
  });
  const ws7=XLSX.utils.aoa_to_sheet(s7rows);
  ws7["!cols"]=[{wch:18},{wch:16},{wch:12},{wch:10},{wch:14},{wch:14},{wch:14},{wch:14},{wch:10},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws7,"현장별수금현황");

  const dateStr=new Date().toISOString().slice(0,10).replace(/-/g,"");
  XLSX.writeFile(wb,`연간분석리포트_${year}_${dateStr}.xlsx`);
  if(window._showSaved) window._showSaved("📈 연간 분석 리포트 저장됨");
}

        ? Math.floor((Date.now()-new Date(o.invoiceDate).getTime())/86400000)
        : "";
      orderRows.push([
        p.id, p.customerName, p.aptName||"", p.constructionType,
        o.id, o.date||"", o.amount,
        o.invoiceDate||"", o.depositDate||"",
        o.depositDate?"입금완료":o.invoiceDate?"미입금":"계산서미발행",
        ageDays
      ]);
    });
  });
  const ws2 = XLSX.utils.aoa_to_sheet([orderHeader, ...orderRows]);
  ws2["!cols"] = [8,14,16,10,8,10,12,10,10,10,8].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws2, "자재주문내역");

  // ── 시트3: 청구서 내역 ──
  const billHeader = ["청구서ID","고객사명","아파트명","공사형태","공사명","청구구분","청구금액","청구서발행일","계산서발행일","입금일","상태","미수일수"];
  const billRows = allBills.map(b=>{
    const refDate = b.invoiceDate || b.issuedDate;
    const ageDays = refDate && b.status!=="수금완료"
      ? Math.floor((Date.now()-new Date(refDate).getTime())/86400000)
      : "";
    return [
      b.id, b.customerName, b.aptName||"", b.constructionType||"", b.constructionName||"",
      b.type||"", b.amount, b.issuedDate||"", b.invoiceDate||"", b.depositDate||"",
      b.status||"", ageDays
    ];
  });
  const ws3 = XLSX.utils.aoa_to_sheet([billHeader, ...billRows]);
  ws3["!cols"] = [8,14,16,10,14,8,12,10,10,10,10,8].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws3, "청구서내역");

  // ── 시트4: 미수금 현황 (계산서 발행 기준) ──
  const unpaidHeader = ["구분","고객사명","아파트명","공사형태","금액","계산서발행일","미수경과일","연령구분"];
  const unpaidRows = [];
  // 청구서 미수금
  allBills.filter(b=>b.status!=="수금완료").forEach(b=>{
    const refDate = b.invoiceDate||b.issuedDate;
    const days = refDate ? Math.floor((Date.now()-new Date(refDate).getTime())/86400000) : "";
    const age = days===""?"N/A":days>=60?"60일 초과":days>=30?"30~59일":"30일 미만";
    unpaidRows.push(["청구서", b.customerName, b.aptName||"", b.constructionType||"", b.amount, refDate||"", days, age]);
  });
  // 자재주문 미수금
  projects.forEach(p=>{
    p.orders.forEach(o=>{
      if(o.invoiceDate && !o.depositDate){
        const days = Math.floor((Date.now()-new Date(o.invoiceDate).getTime())/86400000);
        const age  = days>=60?"60일 초과":days>=30?"30~59일":"30일 미만";
        unpaidRows.push(["자재계산서", p.customerName, p.aptName||"", p.constructionType, o.amount, o.invoiceDate, days, age]);
      }
    });
  });
  // 합계행
  const totalUnpaid = unpaidRows.reduce((s,r)=>s+r[4],0);
  unpaidRows.push(["합계","","","","",totalUnpaid,"",""]);
  const ws4 = XLSX.utils.aoa_to_sheet([unpaidHeader, ...unpaidRows]);
  ws4["!cols"] = [10,14,16,10,12,10,8,10].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws4, "미수금현황");

  // 파일 저장
  const dateStr = new Date().toISOString().slice(0,10).replace(/-/g,"");
  XLSX.writeFile(wb, `대금청구관리_${dateStr}.xlsx`);
  if(window._showSaved) window._showSaved("📊 엑셀 저장됨");
}

function renderCompletedList(){
  const el = document.getElementById("completed-list-area");
  if(!el) return;
  const completed = projects.filter(p=>p.status==="완료");
  const filtered = completedSearch.trim()
    ? completed.filter(p=>p.customerName.includes(completedSearch)||(p.aptName&&p.aptName.includes(completedSearch)))
    : completed;

  if(filtered.length===0){
    el.innerHTML=`<div class="info-box info-yellow" style="text-align:center;padding:16px">"${completedSearch}" 검색 결과가 없습니다.</div>`;
    return;
  }

  let html="";
  const groupDef = [
    {key:"컨설팅",   label:"컨설팅",    cls:"gh-consulting", icon:"🔵"},
    {key:"기술자재형", label:"기술자재형", cls:"gh-tech",       icon:"🟣"},
    {key:"자재판매형", label:"자재판매형", cls:"gh-material",   icon:"🟠"},
    {key:"기타",     label:"기타",      cls:"gh-etc",        icon:"🟢"},

  const knownTypes = groupDef.map(g=>g.key);

    html+=`<div class="group-header ${g.cls}">${g.icon} ${g.label}<span class="group-count">${group.length}건</span></div>`;
    html+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px;margin-bottom:6px">`;
    group.forEach(p=>{
      const bills  = allBills.filter(b=>b.projectId===p.id);
      const billed = bills.reduce((s,b)=>s+b.amount,0);
      const unpaid = bills.filter(b=>b.status!=="수금완료").reduce((s,b)=>s+b.amount,0);
      html+=`<div class="proj-card" style="border-left:3px solid #16a34a">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:3px">
              <span style="font-weight:700;font-size:14px;color:#111827">${p.aptName||p.customerName}</span>
              <span class="badge b-green">완료</span>
            </div>
            <div style="font-size:11px;color:#6b7280;margin-bottom:6px">
              ${[p.aptName?p.customerName:null,p.category,fmtNum(p.bidPrice),p.expectedCompletionDate?"준공 "+p.expectedCompletionDate:null].filter(Boolean).join(" · ")}
            </div>
            <div style="display:flex;gap:10px;font-size:11px">
              <span style="color:#6b7280">청구: <strong style="color:#4338ca">${fmtNum(billed)}</strong></span>
            </div>
          </div>
          <div style="flex-shrink:0">
            <button class="btn btn-sm" style="background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;font-size:11px;padding:5px 10px" onclick="openProjectHistory(${p.id})">📋 이력보기</button>
          </div>
        </div>
      </div>`;
    });
    html+=`</div>`;
  });
  const others = filtered.filter(p=>!knownTypes.includes(p.constructionType));
  if(others.length>0){
    html+=`<div class="group-header gh-etc">🟢 기타<span class="group-count">${others.length}건</span></div>`;
    html+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px;margin-bottom:6px">`;
