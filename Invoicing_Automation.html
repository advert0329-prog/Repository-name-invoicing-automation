            <td style="padding:6px 8px;text-align:center">${stEl}</td>
          </tr>`;
        }).join("")}
      </tbody>
      <tfoot><tr style="background:#f9fafb">
        <td style="padding:6px 8px;font-weight:700;color:#374151">합계</td>
        <td style="padding:6px 8px;text-align:right;font-weight:700;color:#4338ca">${fmtNum(billTotal)}</td>
        <td colspan="3"></td>
        <td style="padding:6px 8px;text-align:center;font-size:11px">
          ${paidTotal>0?`<span style="color:#16a34a">수금 ${fmtNum(paidTotal)}</span>`:""}
          ${unpaidTotal>0?`<span style="color:#dc2626;margin-left:4px">미수 ${fmtNum(unpaidTotal)}</span>`:""}
        </td>
      </tr></tfoot>
    </table></div>`;

    // 최종 수금 요약
    const allPaid = unpaidTotal===0 && bills.length>0;
    html += `<div style="text-align:right;font-size:12px;padding:4px 0 8px;${allPaid?"color:#16a34a;font-weight:700":"color:#dc2626;font-weight:700"}">
      ${allPaid?"✅ 전액 수금 완료":`⚠️ 잔여 미수금: ${fmtNum(unpaidTotal)}`}
    </div>`;
  }

  document.getElementById("history-modal-body").innerHTML = html;
  openModal("modal-project-history");
}

// ── 완료된 현장 전용 엑셀 다운로드 ──
function downloadCompletedExcel(){
  const completed = projects.filter(p=>p.status==="완료");
  if(completed.length===0){ alert("완료된 현장이 없습니다."); return; }

  const wb = XLSX.utils.book_new();

  /* ════════════════════════════════════════════
     시트1 : 완료현장 목록 (회사 내부 기록용)
  ════════════════════════════════════════════ */
  const header1 = [
    "NO","공사구분","공종","아파트명","특허번호","공사명","낙찰사(고객사)","낙찰금액",
    "낙찰일","착공일","준공일","담당자이메일",
    "자재주문 횟수","자재주문금액(합계)","자재주문 일자·금액 전체(차수별)",
    "계산서발행 횟수","계산서발행금액(합계)","계산서 발행일·금액 전체(차수별)",
    "입금완료 횟수","최종입금일","미수금액",
    "특허료청구금액","특허료계산서발행일",
    "수금상태","비고",
    "※ 상세내역은 [자재주문상세] [청구서상세] [수금타임라인] 시트 참조"
  ];

  const rows1 = completed.map((p, idx)=>{
    // 자재주문 집계
    const orders = p.orders || [];
    const sortedOrders = orders.slice().sort((a,b)=>a.date>b.date?1:-1);
    const totalOrderAmt = orders.reduce((s,o)=>s+o.amount,0);

    // 차수별 자재주문 일자·금액 문자열 (1차: 날짜/금액 · 2차: 날짜/금액 ...)
    const orderDetail = sortedOrders.length > 0
      ? sortedOrders.map((o,i)=>`${i+1}차: ${o.date||"-"} / ${Number(o.amount||0).toLocaleString()}원`).join("\n")
      : "";

    // 계산서 발행 집계
    const invoicedOrders = sortedOrders.filter(o=>o.invoiceDate);
    const totalInvAmt    = invoicedOrders.reduce((s,o)=>s+o.amount,0);
    const invoiceDetail  = invoicedOrders.length > 0
      ? invoicedOrders.map((o,i)=>`${i+1}차: ${o.invoiceDate} / ${Number(o.amount||0).toLocaleString()}원`).join("\n")
      : "";

    // 입금 집계
    const depositedOrders = sortedOrders.filter(o=>o.depositDate);
    const lastDepDate     = depositedOrders.length > 0
      ? depositedOrders.slice().sort((a,b)=>a.depositDate>b.depositDate?-1:1)[0].depositDate
      : "";
    const depositedAmt    = depositedOrders.reduce((s,o)=>s+o.amount,0);
    const unpaidOrderAmt  = invoicedOrders.filter(o=>!o.depositDate).reduce((s,o)=>s+o.amount,0);

    // 청구서에서 특허료 집계
    const projBills   = allBills.filter(b=>b.projectId===p.id);
    const patentBills = projBills.filter(b=>b.type==="특허료");
    const patentAmt   = patentBills.reduce((s,b)=>s+b.amount,0);
    const patentInvDate = patentBills
      .filter(b=>b.invoiceDate)
      .sort((a,b)=>a.invoiceDate>b.invoiceDate?1:-1)
      .map((b,i)=>`${i+1}차: ${b.invoiceDate}`)
      .join("\n") || "";

    // 수금상태 판정
    const unpaidOrders = orders.filter(o=>o.invoiceDate&&!o.depositDate).length;
    const unpaidBills  = projBills.filter(b=>b.status!=="수금완료").length;
    const collStatus   = (unpaidOrders===0 && unpaidBills===0) ? "수금완료" : "미수금있음";

    return [
      idx+1,
      p.constructionType||"",
      p.category||"",
      p.aptName||"",
      p.patentNo||"",
      p.constructionName||"",
      p.customerName||"",
      p.bidPrice||0,
      p.bidConfirmDate||"",
      p.startDate||"",
      p.expectedCompletionDate||"",
      p.contactEmail||"",
      sortedOrders.length||0,          // 자재주문 횟수
      totalOrderAmt||"",               // 자재주문금액 합계
      orderDetail,                     // 차수별 주문일·금액
      invoicedOrders.length||0,        // 계산서발행 횟수
      totalInvAmt||"",                 // 계산서발행금액 합계
      invoiceDetail,                   // 차수별 발행일·금액
      depositedOrders.length||0,       // 입금완료 횟수
      lastDepDate,                     // 최종입금일
      unpaidOrderAmt||"",              // 미수금액
      patentAmt||"",
      patentInvDate,
      collStatus,
      "",                              // 비고 (수기 입력용)
      ""
    ];
  });

  // 합계행 (인덱스: 7=낙찰금액, 13=주문합계, 16=계산서합계, 20=미수금액, 21=특허료)
  const sumBid    = completed.reduce((s,p)=>s+p.bidPrice,0);
  const sumOrder  = rows1.reduce((s,r)=>s+(Number(r[13])||0),0);
  const sumInv    = rows1.reduce((s,r)=>s+(Number(r[16])||0),0);
  const sumUnpaid = rows1.reduce((s,r)=>s+(Number(r[20])||0),0);
  const sumPatent = rows1.reduce((s,r)=>s+(Number(r[21])||0),0);
  rows1.push(["합계","","","","","","",sumBid,"","","","","",sumOrder,"","",sumInv,"","","",sumUnpaid,sumPatent,"","","",""]);

  const ws1 = XLSX.utils.aoa_to_sheet([header1, ...rows1]);

  // 차수별 상세 셀 줄바꿈 처리
  rows1.forEach((_, ri)=>{
    [14, 17, 22].forEach(ci=>{
      const ref = XLSX.utils.encode_cell({r: ri+1, c: ci});
      if(ws1[ref] && ws1[ref].v) ws1[ref].s = { alignment: { wrapText: true, vertical: "top" } };
    });
  });

  // 열 너비
  ws1["!cols"] = [5,10,8,18,14,14,14,13,10,10,10,22, 8,14,32, 8,14,32, 8,12,12, 14,22, 10,12,30].map(w=>({wch:w}));

  // 헤더 행 스타일 (배경색 · 굵게)
  const hdrStyle = {font:{bold:true},fill:{fgColor:{rgb:"1E3A8A"}},
                    font:{bold:true,color:{rgb:"FFFFFF"}},
                    alignment:{horizontal:"center",vertical:"center"},
                    border:{bottom:{style:"medium",color:{rgb:"000000"}}}};
  header1.forEach((_,c)=>{
    const cellRef = XLSX.utils.encode_cell({r:0,c});
    if(!ws1[cellRef]) ws1[cellRef]={v:header1[c],t:"s"};
    ws1[cellRef].s = hdrStyle;
  });

  // 합계행 스타일
  const sumRowIdx = rows1.length; // header + data rows(합계 포함)
  const sumStyle = {font:{bold:true},fill:{fgColor:{rgb:"EFF6FF"}},
                    font:{bold:true,color:{rgb:"1E3A8A"}}};
  header1.forEach((_,c)=>{
    const cellRef = XLSX.utils.encode_cell({r:sumRowIdx,c});
    if(ws1[cellRef]) ws1[cellRef].s = sumStyle;
  });

  XLSX.utils.book_append_sheet(wb, ws1, "완료현장목록");

  /* ════════════════════════════════════════════
     시트2 : 자재주문 상세 내역
  ════════════════════════════════════════════ */
  const header2 = ["NO","아파트명","낙찰사","공사구분","주문일","자재주문금액","계산서발행일","계산서발행금액","입금일","입금상태"];
  const rows2 = [];
  let no2 = 1;
  completed.forEach(p=>{
    (p.orders||[]).forEach(o=>{
      rows2.push([
        no2++,
        p.aptName||p.customerName,
        p.customerName,
        p.constructionType||"",
        o.date||"",
        o.amount||0,
        o.invoiceDate||"",
        o.invoiceDate ? o.amount : "",
        o.depositDate||"",
        o.depositDate?"입금완료":o.invoiceDate?"미입금":"계산서미발행"
      ]);
    });
  });
  if(rows2.length===0) rows2.push(["","주문 내역 없음","","","","","","","",""]);
  const ws2 = XLSX.utils.aoa_to_sheet([header2, ...rows2]);
  ws2["!cols"] = [5,18,14,10,10,13,12,14,10,12].map(w=>({wch:w}));
  header2.forEach((_,c)=>{
    const cellRef = XLSX.utils.encode_cell({r:0,c});
    if(!ws2[cellRef]) ws2[cellRef]={v:header2[c],t:"s"};
    ws2[cellRef].s = hdrStyle;
  });
  XLSX.utils.book_append_sheet(wb, ws2, "자재주문상세");

  /* ════════════════════════════════════════════
     시트3 : 청구서 상세 내역 (특허료 포함)
  ════════════════════════════════════════════ */
  const header3 = ["NO","아파트명","낙찰사","공사구분","청구구분","청구금액","청구서발행일","계산서발행일","입금일","상태"];
  const rows3 = [];
  let no3 = 1;
  completed.forEach(p=>{
    allBills.filter(b=>b.projectId===p.id).forEach(b=>{
      rows3.push([
        no3++,
        p.aptName||p.customerName,
        p.customerName,
        p.constructionType||"",
        b.type||"",
        b.amount||0,
        b.issuedDate||"",
        b.invoiceDate||"",
        b.depositDate||"",
        b.status||""
      ]);
    });
  });
  if(rows3.length===0) rows3.push(["","청구서 없음","","","","","","","",""]);
  const ws3 = XLSX.utils.aoa_to_sheet([header3, ...rows3]);
  ws3["!cols"] = [5,18,14,10,10,13,12,12,10,10].map(w=>({wch:w}));
  header3.forEach((_,c)=>{
    const cellRef = XLSX.utils.encode_cell({r:0,c});
    if(!ws3[cellRef]) ws3[cellRef]={v:header3[c],t:"s"};
    ws3[cellRef].s = hdrStyle;
  });
  XLSX.utils.book_append_sheet(wb, ws3, "청구서상세");

  /* ════════════════════════════════════════════
     시트4 : 현장별 수금 타임라인
     - 자재주문·계산서발행·입금을 날짜순으로 정렬해
       한눈에 수금 흐름을 파악할 수 있는 시트
  ════════════════════════════════════════════ */
  const header4 = [
    "NO","아파트명","낙찰사","공사구분",
    "구분",          // 자재주문 / 계산서발행 / 입금 / 특허료청구 / 특허료입금
    "차수",          // 1차, 2차 …
    "날짜",
    "금액",
    "비고"           // 계산서미발행 / 미입금 / 입금완료 등
  ];
  const rows4 = [];
  let no4 = 1;

  completed.forEach(p=>{
    const orders   = (p.orders||[]).slice().sort((a,b)=>a.date>b.date?1:-1);
    const projBills= allBills.filter(b=>b.projectId===p.id);
    const aptLabel = p.aptName||p.customerName;
    const custLabel= p.customerName;
    const typeLabel= p.constructionType||"";

    // ── 자재주문 이벤트 생성 ──
    orders.forEach((o, i)=>{
      const seq = `${i+1}차`;
      // 주문 접수
      rows4.push([no4++, aptLabel, custLabel, typeLabel, "자재주문", seq, o.date||"", o.amount||0,
        o.invoiceDate ? "계산서발행완료" : "계산서미발행"]);
      // 계산서 발행
      if(o.invoiceDate){
        rows4.push([no4++, aptLabel, custLabel, typeLabel, "계산서발행", seq, o.invoiceDate, o.amount||0,
          o.depositDate ? "입금완료" : "미입금"]);
      }
      // 입금
      if(o.depositDate){
        rows4.push([no4++, aptLabel, custLabel, typeLabel, "입금", seq, o.depositDate, o.amount||0, "입금완료"]);
      }
    });

    // ── 특허료·기타 청구서 이벤트 생성 ──
    projBills.forEach((b, i)=>{
      const seq = `${i+1}차`;
      // 청구서 발행
      if(b.issuedDate){
        rows4.push([no4++, aptLabel, custLabel, typeLabel, `청구서발행(${b.type||""})`, seq,
          b.issuedDate, b.amount||0, b.status||""]);
      }
      // 계산서 발행
      if(b.invoiceDate){
        rows4.push([no4++, aptLabel, custLabel, typeLabel, `계산서발행(${b.type||""})`, seq,
          b.invoiceDate, b.amount||0, b.depositDate?"입금완료":"미입금"]);
      }
      // 입금
      if(b.depositDate){
        rows4.push([no4++, aptLabel, custLabel, typeLabel, `입금(${b.type||""})`, seq,
          b.depositDate, b.amount||0, "입금완료"]);
      }
    });
  });

  // 날짜 오름차순 정렬 (NO 제외, 날짜 열=index 6 기준)
  rows4.sort((a,b)=>{
    if(a[1]!==b[1]) return 0; // 같은 현장 내에서만 정렬 (현장 순서 유지)
    return (a[6]||"") > (b[6]||"") ? 1 : -1;
  });
  // NO 재부여
  rows4.forEach((r,i)=>{ r[0]=i+1; });

  if(rows4.length===0) rows4.push(["","내역 없음","","","","","","",""]);

  const ws4 = XLSX.utils.aoa_to_sheet([header4, ...rows4]);
  ws4["!cols"] = [5,18,14,10,18,6,12,14,14].map(w=>({wch:w}));
  header4.forEach((_,c)=>{
    const cellRef = XLSX.utils.encode_cell({r:0,c});
    if(!ws4[cellRef]) ws4[cellRef]={v:header4[c],t:"s"};
    ws4[cellRef].s = hdrStyle;
  });

  // 구분별 행 색상 (자재주문=파랑, 계산서=보라, 입금=초록, 청구=주황)
  const rowColors = {
    "자재주문":    "DBEAFE",
    "계산서발행":  "F3E8FF",
    "입금":        "DCFCE7",
    "청구서발행":  "FFEDD5",
  };
  rows4.forEach((r, ri)=>{
    const label = String(r[4]||"");
    const colorKey = Object.keys(rowColors).find(k=>label.startsWith(k));
    if(colorKey){
      const fillStyle = {fill:{fgColor:{rgb:rowColors[colorKey]}}};
      header4.forEach((_,c)=>{
        const ref = XLSX.utils.encode_cell({r:ri+1, c});
        if(ws4[ref]) ws4[ref].s = fillStyle;
      });
    }
  });

  XLSX.utils.book_append_sheet(wb, ws4, "수금타임라인");

  // 파일명에 날짜+시간 포함 (버전 구분용)
  const now = new Date();
  const stamp = now.toISOString().slice(0,16).replace("T","_").replace(/:/g,"");
  XLSX.writeFile(wb, `완료현장기록_${stamp}.xlsx`);
  if(window._showSaved) window._showSaved("📥 완료현장 엑셀 저장됨");
}

// ── 설정 탭 ──
function renderSettings(){
  document.getElementById("page-8").innerHTML = buildSettingsHtml();
  renderFbSection();
}

  const cats = guidePdfStore.categories || {};
  const roadmap = guidePdfStore.roadmap;

  // 공종별 안내문 목록 행

    ? `<div style="font-size:12px;color:#9ca3af;padding:12px 0">등록된 공종 안내문이 없습니다.</div>`
    : Object.entries(cats).map(([cat, info])=>`
      <div style="display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #f3f4f6">
        <span style="font-size:13px;font-weight:600;color:#374151;min-width:80px">${cat}</span>
        <span style="font-size:12px;color:#6b7280;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">📎 ${info.name}</span>
        <span style="font-size:11px;color:#9ca3af;white-space:nowrap">${(info.size/1024).toFixed(0)}KB</span>
        <span style="font-size:11px;color:#9ca3af;white-space:nowrap">${info.uploadedAt}</span>
        <button class="btn btn-red btn-sm" onclick="deleteCategoryPdf('${cat}')">삭제</button>
      </div>`).join("");

  const roadmapSection = roadmap
    ? `<div style="display:flex;align-items:center;gap:8px;padding:9px 0">
        <span style="font-size:13px;color:#374151;flex:1">📎 ${roadmap.name}</span>
        <span style="font-size:11px;color:#9ca3af">${(roadmap.size/1024).toFixed(0)}KB · ${roadmap.uploadedAt}</span>
        <button class="btn btn-gray btn-sm" onclick="document.getElementById('roadmap-pdf-input').click()">교체</button>
        <button class="btn btn-red btn-sm" onclick="deleteRoadmapPdf()">삭제</button>
      </div>`
    : `<div style="text-align:center;padding:14px 0">
        <button class="btn btn-purple" onclick="document.getElementById('roadmap-pdf-input').click()">📂 로드맵 PDF 업로드</button>
        <p style="font-size:11px;color:#9ca3af;margin-top:6px">공통 로드맵 안내서 PDF 1개를 등록해주세요</p>
      </div>`;

  const billTmpl = guidePdfStore.billTemplate;
  const billTemplateSection = billTmpl
    ? `<div style="display:flex;align-items:center;gap:8px;padding:9px 0">
        <span style="font-size:13px;color:#374151;flex:1">📎 ${billTmpl.name}</span>
        <span style="font-size:11px;color:#9ca3af">${(billTmpl.size/1024).toFixed(0)}KB · ${billTmpl.uploadedAt}</span>
        <button class="btn btn-gray btn-sm" onclick="document.getElementById('bill-tmpl-input').click()">교체</button>
        <button class="btn btn-red btn-sm" onclick="deleteBillTemplate()">삭제</button>
      </div>`
    : `<div style="text-align:center;padding:14px 0">
        <button class="btn btn-blue" onclick="document.getElementById('bill-tmpl-input').click()">📂 청구서 엑셀 템플릿 업로드</button>
        <p style="font-size:11px;color:#9ca3af;margin-top:6px">특허기술 자문료 요청서 .xlsx 파일을 등록해주세요</p>
      </div>`;

  const noticeTmpl = guidePdfStore.noticeTemplate;
  const noticeTemplateSection = noticeTmpl
    ? `<div style="display:flex;align-items:center;gap:8px;padding:9px 0">
        <span style="font-size:13px;color:#374151;flex:1">📎 ${noticeTmpl.name}</span>
        <span style="font-size:11px;color:#9ca3af">${(noticeTmpl.size/1024).toFixed(0)}KB · ${noticeTmpl.uploadedAt}</span>
        <button class="btn btn-gray btn-sm" onclick="document.getElementById('notice-tmpl-input').click()">교체</button>
        <button class="btn btn-red btn-sm" onclick="deleteNoticeTemplate()">삭제</button>
      </div>`
    : `<div style="text-align:center;padding:14px 0">
        <button class="btn btn-blue" onclick="document.getElementById('notice-tmpl-input').click()">📂 공문 엑셀 템플릿 업로드</button>
        <p style="font-size:11px;color:#9ca3af;margin-top:6px">공사이용안내서 공문 .xlsx 파일을 등록해주세요</p>
      </div>`;

  return `
  <p class="sec-title">⚙️ 설정</p>

  <!-- 하이웍스 메일 설정 -->
  <div class="card" style="margin-bottom:16px">
    <div style="font-size:13px;font-weight:700;color:#374151;margin-bottom:10px;display:flex;align-items:center;gap:6px">
      ✉️ 하이웍스 메일 설정
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <span style="font-size:12px;color:#6b7280;white-space:nowrap">mail.office.hiworks.com/</span>
      <input type="text" id="hiworks-domain-input"
        value="${hiworksDomain}"
        placeholder="회사도메인 (예: netformrnd.com)"
        style="flex:1;min-width:140px;border:1px solid #d1d5db;border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit;outline:none"/>
      <span style="font-size:12px;color:#6b7280;white-space:nowrap">/mail/webmail/m_write</span>
      <button class="btn btn-primary btn-sm" onclick="(function(){const v=document.getElementById('hiworks-domain-input').value.trim();if(!v){alert('도메인을 입력해주세요');return;}saveHiworksDomain(v);alert('✅ 저장되었습니다.');})()">저장</button>

function triggerCategoryUpload(){
  const nameEl = document.getElementById("new-category-name");
  if(!nameEl || !nameEl.value.trim()){ alert("공종명을 먼저 입력해주세요."); return; }
  document.getElementById("category-pdf-input").dataset.pendingCategory = nameEl.value.trim();
  document.getElementById("category-pdf-input").click();
}

function handleCategoryPdfUpload(input){
  const file = input.files[0];
  if(!file) return;
  const categoryName = input.dataset.pendingCategory;
  if(!categoryName){ alert("공종명이 없습니다. 공종명을 입력 후 다시 시도해주세요."); input.value=""; return; }
  if(file.size > 3 * 1024 * 1024){ alert("파일이 3MB를 초과합니다. 더 작은 PDF를 사용해주세요."); input.value=""; return; }

  const reader = new FileReader();
  reader.onload = function(e){
    guidePdfStore.categories[categoryName] = {
      name: file.name, base64: e.target.result,
      size: file.size, uploadedAt: todayStr()
    };
    saveGuidePdfStore();
    renderCategoryPdfList();
    const nameEl = document.getElementById("new-category-name");
    if(nameEl) nameEl.value = "";
    input.value = "";
    delete input.dataset.pendingCategory;
    if(window._showSaved) window._showSaved(`✅ '${categoryName}' 안내문 등록됨`);
  };
  reader.readAsDataURL(file);
}

function deleteCategoryPdf(category){
  if(!confirm(`'${category}' 안내문 PDF를 삭제하시겠습니까?`)) return;
  delete guidePdfStore.categories[category];
  saveGuidePdfStore();
  renderCategoryPdfList();
}

async function downloadNoticeXlsx(p, seqNo){
  const tmpl = guidePdfStore.noticeTemplate;
  if(!tmpl){
    alert("공문 엑셀 템플릿이 등록되지 않았습니다.\n설정 탭에서 먼저 업로드해주세요.");
    return;
  }
  if(typeof JSZip === "undefined"){
    alert("JSZip 라이브러리가 아직 로드 중입니다. 잠시 후 다시 시도해주세요."); return;
  }
  try {
    const today    = new Date();
    const yyyy     = today.getFullYear();
    const mm       = String(today.getMonth()+1).padStart(2,"0");
    const dd       = String(today.getDate()).padStart(2,"0");
    const excelSerial = Math.floor(
      (Date.UTC(yyyy, today.getMonth(), today.getDate()) - Date.UTC(1899,11,30)) / 86400000
    );
    const bidStr = p.bidPrice ? Number(p.bidPrice).toLocaleString("ko-KR")+"원" : "원";

    // base64 → Uint8Array
    const b64 = tmpl.base64.includes(",") ? tmpl.base64.split(",")[1] : tmpl.base64;
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);

    // JSZip으로 xlsx(ZIP) 열기 → 내부 XML만 수정 (이미지·서식 그대로 보존)
    const zip = await JSZip.loadAsync(bytes);

    // ── sharedStrings.xml: 새 문자열 추가 ──
    let ssXml = await zip.file("xl/sharedStrings.xml").async("string");

    // 실제 공유문자열 수를 동적으로 계산 (하드코딩 금지 — 템플릿마다 다름)
    const ORIG_SS_COUNT = (ssXml.match(/<si>/g) || []).length;
    let addedCount = 0;

    function escXml(s){
      return String(s)
        .replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }
    function addSharedStr(text){
      const idx = ORIG_SS_COUNT + addedCount;
      const sp  = (text !== text.trim()) ? ' xml:space="preserve"' : '';
      ssXml = ssXml.replace("</sst>", `<si><t${sp}>${escXml(text)}</t></si></sst>`);
      addedCount++;
      return idx;
    }

    // 채울 데이터의 공유문자열 인덱스
    const c3Idx  = addSharedStr(p.customerName     || "");  // C3  수신
    const aptNameForDoc = (p.aptName || "").replace(/\s*아파트$/, "").trimEnd(); // 템플릿에 "아파트" 고정텍스트가 있으므로 중복 제거
    const g12Idx = addSharedStr(aptNameForDoc);              // G12 아파트명
    const g13Idx = addSharedStr(p.constructionName || "");  // G13 공사명
    const rawPatent = (p.patentNo || "").replace(/^특허\s*/g,"").replace(/^제\s*/g,"").replace(/\s*호\s*$/g,"").trim();
    const g14Val = rawPatent ? `제 ${rawPatent} 호` : "";
    const g14Idx = addSharedStr(g14Val);                    // G14 특허번호 → "제 XX-XXXXXXX 호" 형식
    const g15Idx = addSharedStr(bidStr);                    // G15 낙찰금액
    const c32Idx = addSharedStr(`제 ${yyyy}-`);  // C32: 문서번호 연도 (항상 새 문자열 추가)

    // count/uniqueCount 업데이트
    const total = ORIG_SS_COUNT + addedCount;
    ssXml = ssXml.replace(/count="\d+"/, `count="${total}"`);
    ssXml = ssXml.replace(/uniqueCount="\d+"/, `uniqueCount="${total}"`);
    zip.file("xl/sharedStrings.xml", ssXml);

    // ── sheet1.xml: 특정 셀 값 교체 ──
    let xml = await zip.file("xl/worksheets/sheet1.xml").async("string");

    // 공유문자열 셀로 강제 교체 (어떤 셀 타입이든 동작)
    // 스타일 속성(s="N")은 보존하고 값·타입만 교체
    function _forceStrCell(addr, strIdx){
      // 스타일 인덱스 추출
      const sM = xml.match(new RegExp(`<c r="${addr}"[^>]*?s="(\\d+)"`));
      const sAttr = sM ? ` s="${sM[1]}"` : '';
      // 셀 전체 범위를 하나의 패턴으로 교체 (self-closing + open/close 양쪽 처리)
      // self-closing: <c r="X" ... />
      const reSelf = new RegExp(`<c r="${addr}"[^>]*?\\/>`);
      // open/close: <c r="X" ...>...</c>  (내부에 줄바꿈 허용)
      const reOpen = new RegExp(`<c r="${addr}"[^>]*>[\\s\\S]*?<\\/c>`);
      if(reSelf.test(xml)){
        xml = xml.replace(reSelf, `<c r="${addr}"${sAttr} t="s"><v>${strIdx}</v></c>`);
      } else if(reOpen.test(xml)){
        xml = xml.replace(reOpen, `<c r="${addr}"${sAttr} t="s"><v>${strIdx}</v></c>`);
      }
    }

    // 빈 셀(self-closing) → 공유문자열 셀로 변환 (기존 동작 유지 + 폴백)
    // 예: <c r="C3" s="34"/> → <c r="C3" s="34" t="s"><v>36</v></c>
    function setEmptyToStr(addr, strIdx){
      _forceStrCell(addr, strIdx);
    }

    // 기존 셀 값을 공유문자열로 교체 (t="s", 숫자, inlineStr 모두 처리)
    function updateStrCell(addr, strIdx){
      _forceStrCell(addr, strIdx);
    }

    // 숫자 셀의 v 값 교체 (수식 캐시 포함)
    // 예: <c r="H32" ...><v>46367</v></c>
    //     <c r="D32" ...><f>H32</f><v>46367</v></c>
    function updateNumCell(addr, numVal){
      const re = new RegExp(`(<c r="${addr}"[^>]*>(?:<f>[^<]*</f>)?<v>)[\\d.]+(</v></c>)`);
      xml = xml.replace(re, `$1${numVal}$2`);
    }

    // ── styles.xml: G13 공사명 셀에 wrapText 적용 (텍스트 잘림 방지) ──
    const g13StyleMatch = xml.match(/<c r="G13" s="(\d+)"\/>/);
    if(g13StyleMatch){
      const sIdx = parseInt(g13StyleMatch[1]);
      const stylesFile = zip.file("xl/styles.xml");
      if(stylesFile){
        let stylesXml = await stylesFile.async("string");
        let xfCount = 0;
        stylesXml = stylesXml.replace(
          /(<cellXfs[^>]*>)([\s\S]*?)(<\/cellXfs>)/,
          (_, open, body, close) => {
            const newBody = body.replace(
              /<xf\b([^>]*?)(\/>|>[\s\S]*?<\/xf>)/g,
              (m, attrs, tail) => {
                if(xfCount++ !== sIdx) return m;
                const applyAttr = attrs.includes("applyAlignment") ? attrs : attrs + ' applyAlignment="1"';
                if(tail === "/>"){ // 자기닫힘 셀 → alignment 자식 추가
                  return `<xf${applyAttr}><alignment wrapText="1"/></xf>`;
                } else if(/<alignment/.test(tail)){ // alignment 이미 존재
                  if(/wrapText/.test(tail)) return `<xf${applyAttr}${tail}`; // 이미 있으면 applyAlignment만 갱신
                  return `<xf${applyAttr}` + tail.replace("<alignment", '<alignment wrapText="1" ');
                } else { // alignment 없음 → 삽입
                  return `<xf${applyAttr}` + tail.replace("</xf>", '<alignment wrapText="1"/></xf>');
                }
              }
            );
            return open + newBody + close;
          }
        );
        zip.file("xl/styles.xml", stylesXml);
      }
    }

    // 셀 값 적용
    setEmptyToStr("C3",  c3Idx);   // 수신(고객사명) - 원본 빈 셀
    setEmptyToStr("G12", g12Idx);  // 아파트명 - 원본 빈 셀
    setEmptyToStr("G13", g13Idx);  // 공사명 - 원본 빈 셀
    setEmptyToStr("G14", g14Idx);  // 특허번호 - 원본 빈 셀
    updateStrCell("G15", g15Idx);  // 낙찰금액 (원본 "원" 교체)
    updateStrCell("C32", c32Idx);  // 문서번호 연도
    updateNumCell("H32", excelSerial); // 시행일자 (날짜 시리얼)
    updateNumCell("D32", excelSerial); // D32 캐시값도 업데이트 (=H32 수식)

    zip.file("xl/worksheets/sheet1.xml", xml);

    // ── 다운로드 ──
    const blob = await zip.generateAsync({
      type: "blob",
      compression: "DEFLATE",
      compressionOptions: { level: 6 }
    });
    const url = URL.createObjectURL(blob);
    const a   = document.createElement("a");
    a.href     = url;
    a.download = `공사이용안내서_공문_${p.aptName||p.customerName||"현장"}_${yyyy}${mm}${dd}.xlsx`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

  } catch(err){
    alert("엑셀 생성 중 오류가 발생했습니다:\n" + err.message);
    console.error("downloadNoticeXlsx error:", err);
  }
}

async function ordDownloadBillXlsx(pid){
  const p = projects.find(x=>x.id===pid);
  if(!p) return;
  const tmpl = guidePdfStore.billTemplate;
  if(!tmpl){ alert("청구서 엑셀 템플릿이 등록되지 않았습니다.\n⚙️ 설정 탭에서 먼저 업로드해주세요."); return; }
  if(typeof JSZip==="undefined"){ alert("JSZip 라이브러리 로드 중입니다. 잠시 후 다시 시도해주세요."); return; }
  try{
    const today = new Date();
    const yyyy = today.getFullYear(), mm = String(today.getMonth()+1).padStart(2,"0"), dd = String(today.getDate()).padStart(2,"0");
    const excelSerial = Math.floor((Date.UTC(yyyy,today.getMonth(),today.getDate())-Date.UTC(1899,11,30))/86400000);
    const bid = Number(p.bidPrice)||0;
    const totalAmt = p.orders.reduce((a,o)=>a+(Number(o.amount)||0),0);
    const patentBase = Math.round(bid*0.02);
    const remain = patentBase - totalAmt;
    const finalFee = Math.round(remain>0?remain/2:0);
    const aptName = p.aptName||p.customerName||"";
    const workName = p.constructionName||"";

    const b64 = tmpl.base64.includes(",")?tmpl.base64.split(",")[1]:tmpl.base64;
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
    const zip = await JSZip.loadAsync(bytes);

    function escXml(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

    // ── sharedStrings.xml: 인덱스 34(수신), 35(아파트명), 36(공사명) 교체 ──
    let ssXml = await zip.file("xl/sharedStrings.xml").async("string");
    let siIdx = -1;
    ssXml = ssXml.replace(/<si>[\s\S]*?<\/si>/g, match=>{
      siIdx++;
      if(siIdx===34) return `<si><t>${escXml(p.customerName||"")}</t></si>`;
      if(siIdx===35) return `<si><t xml:space="preserve">${escXml(aptName)} </t></si>`;
      if(siIdx===36) return `<si><t>${escXml(workName)}</t></si>`;
      return match;
    });
    zip.file("xl/sharedStrings.xml", ssXml);

    // ── sheet1.xml: 숫자·수식 캐시 교체 ──
    let xml = await zip.file("xl/worksheets/sheet1.xml").async("string");

    function updNum(addr, val){
      xml = xml.replace(
        new RegExp(`(<c r="${addr}" [^>]*>(?:<f>[^<]*<\\/f>)?<v[^>]*>)[-\\d.]+(</v></c>)`),
        `$1${val}$2`
      );
    }
    function updStrCache(addr, val){
      xml = xml.replace(
        new RegExp(`(<c r="${addr}" [^>]*t="str"[^>]*><f>[^<]*<\\/f><v[^>]*>)[^<]*(</v></c>)`),
        `$1${escXml(val)}$2`
      );
    }

    updNum("B12", bid);
    updNum("A26", bid);
    updNum("E26", totalAmt);
    updNum("H26", patentBase);
    updNum("H27", -totalAmt);
    updNum("H28", remain);
    updNum("H29", finalFee);
    updNum("H34", excelSerial);
    updNum("D34", excelSerial);
    updStrCache("D10", aptName);
    updStrCache("A22", aptName);

    zip.file("xl/worksheets/sheet1.xml", xml);

    const blob = await zip.generateAsync({type:"blob",compression:"DEFLATE",compressionOptions:{level:6}});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href=url; a.download=`특허기술자문료요청서_${aptName||"현장"}_${yyyy}${mm}${dd}.xlsx`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch(err){
    alert("청구서 엑셀 생성 중 오류:\n"+err.message);
    console.error("ordDownloadBillXlsx error:", err);
  }
}

function handleExcelFile(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const wb=XLSX.read(ev.target.result,{type:"array"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
      if(rows.length<2){alert("데이터가 없습니다.");return;}
      excelHeaders=rows[0].map(h=>String(h).trim());
      excelRows=rows.slice(1).filter(r=>r.some(c=>c!==""));
      showExcelPreview();
    }catch(err){
      alert("파일을 읽을 수 없습니다. xlsx 또는 xls 파일을 선택해주세요.");
    }
  };
  reader.readAsArrayBuffer(file);
  e.target.value="";
}

}

function importExcelData(){
  const colDefs=["no","constructionType","category","aptName","patentNo","constructionName","customerName","bidPrice","orderDate","orderAmount","invoiceDate","invoiceAmount","depositDate","depositAmount","bidConfirmDate","expectedCompletionDate","contactEmail","status"];
  const maps={};
  colDefs.forEach(k=>{maps[k]=getMapVal(k);});

  const getCell=(row,key)=>{
    const idx=maps[key];
    return idx>=0&&idx<row.length?row[idx]:"";
  };

  let imported=0, skipped=0;
  const newProjects=[];

  excelRows.forEach((row,ri)=>{
    const customerName=String(getCell(row,"customerName")||"").trim();
    const bidPrice=cleanNum(getCell(row,"bidPrice"));
    const aptNameVal=String(getCell(row,"aptName")||"").trim();
    if(!customerName&&!bidPrice&&!aptNameVal){skipped++;return;}

    let ct=String(getCell(row,"constructionType")||"").trim();
    let importedStatus=String(getCell(row,"status")||"").trim();

    // 공사형태 매핑
    if(ct==="기술자재형"||ct.includes("기술자재"))          ct="기술자재형";
    else if(ct==="자재판매형"||ct.includes("자재판매"))      ct="자재판매형";
    else if(ct==="컨설팅")                                   ct="컨설팅";
    else if(ct==="공고취소"){ct="공고"; if(!importedStatus) importedStatus="취소";}
    else if(ct==="유찰"   ){ct="공고"; if(!importedStatus) importedStatus="유찰";}
    else if(ct==="공고")                                     ct="공고";
    else if(ct==="타공법낙찰"){ct="기타"; if(!importedStatus) importedStatus="진행중";}
    else if(ct==="타공법")                                   ct="기타";
    else if(ct==="실행")  {ct="기타"; if(!importedStatus) importedStatus="진행중";}
    else if(!["공고","컨설팅","기술자재형","자재판매형","기타"].includes(ct)) ct="기타";

    // 상태 매핑 (엑셀 상태값 우선, 없으면 공사형태에 따라 기본값)
    const validStatuses=["진행중","완료","대기","유찰","취소"];
    let finalStatus = validStatuses.includes(importedStatus) ? importedStatus
      : ct==="공고" ? "대기" : "진행중";

    const orderDate=excelDateToStr(getCell(row,"orderDate"));
    const orderAmount=cleanNum(getCell(row,"orderAmount"));
    const invoiceDate=excelDateToStr(getCell(row,"invoiceDate"));
    const depositDate=excelDateToStr(getCell(row,"depositDate"));
    const depositAmount=cleanNum(getCell(row,"depositAmount"));

    const orders=[];
    if(orderAmount>0){
      orders.push({id:Date.now()+ri,date:orderDate||todayStr(),item:"자재",qty:1,unitPrice:orderAmount,amount:orderAmount,invoiceDate:invoiceDate||"",depositDate:depositDate||""});
    }

    newProjects.push({
      id:Date.now()+ri+1000,
      customerName,
      aptName:String(getCell(row,"aptName")||"").trim(),
      constructionName:String(getCell(row,"constructionName")||"").trim(),
      constructionType:ct,
      bidPrice,
      category:String(getCell(row,"category")||"").trim(),
      patentNo:String(getCell(row,"patentNo")||"").trim(),
      contactEmail:String(getCell(row,"contactEmail")||"").trim(),
      bidConfirmDate:excelDateToStr(getCell(row,"bidConfirmDate")),
      startDate:"",
      expectedCompletionDate:excelDateToStr(getCell(row,"expectedCompletionDate")),
      status:finalStatus,
      orders,
      bills:[],
    });
    imported++;
  });

  if(imported===0){alert("가져올 데이터가 없습니다. 컬럼 매핑을 확인해주세요.");return;}

  const overwrite=projects.length>0?confirm(`기존 프로젝트 ${projects.length}건이 있습니다.\n[확인] 기존 데이터 유지하고 추가\n[취소] 기존 데이터 삭제 후 교체`):false;
  if(overwrite===false&&projects.length>0){
    if(!confirm("기존 데이터를 모두 삭제하고 엑셀 데이터로 교체할까요?"))return;
    projects=newProjects;
  } else {
    projects=[...projects,...newProjects];
  }

  excelRows=[];excelHeaders=[];
  alert(`✅ ${imported}건 가져오기 완료!${skipped>0?`\n(${skipped}건 건너뜀)`:`\n이제 현장 관리 탭에서 확인하세요.`}`);
  showTab(1);
}

function filterCategoryDropdown(val){
  const dropdown = document.getElementById("f-category-dropdown");
  if(!dropdown) return;
  // 현재 등록된 모든 공종 수집 (중복 제거, 공종이 2개 이상 합쳐진 항목 제외)
  // 수동 제외 목록
  const excludedCategories = ['아스콘보도블럭','재도장우레탄'];
  const allCategories = [...new Set(projects.map(p=>p.category).filter(c=>c&&c.trim()))].filter(c=>{
    // 수동 제외
    if(excludedCategories.includes(c.trim())) return false;
    // 구분자(쉼표·슬래시 등)로 합쳐진 경우 제외
    const seps = [',','/','·','&','+',' and ',' 및 '];
    if(seps.some(sep=>c.includes(sep))) return false;
    // 공백 기준으로 단어가 2개 이상이면 여러 공종이 합쳐진 것으로 판단하여 제외
    if(c.trim().split(/\s+/).length >= 2) return false;
    return true;
  });
  const matches = val.trim()
    ? allCategories.filter(c=>c.includes(val))
    : allCategories;
  if(matches.length===0){
    dropdown.style.display="none";
    return;
  }
  dropdown.innerHTML = matches.map(c=>`
    <div onclick="selectCategory('${escHtml(c)}')"
      style="padding:8px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid #f3f4f6"
      onmouseover="this.style.background='#f3f4f6'" onmouseout="this.style.background=''">
      ${c}
    </div>`).join("");
  dropdown.style.display="block";
}

    constructionName:document.getElementById("f-consname").value,
    constructionType:document.getElementById("f-constype").value,
    bidPrice:Number(bid),
    category:document.getElementById("f-category").value,
    patentNo:document.getElementById("f-patent").value,
    contactEmail:document.getElementById("f-email").value,
    bidConfirmDate:newBidDate,
    startDate:document.getElementById("f-startdate").value,
    expectedCompletionDate:document.getElementById("f-enddate").value,
    guideSentDate:document.getElementById("f-guidesentdate").value||"",
    status:document.getElementById("f-status").value,
    creditGrade:document.getElementById("f-credit").value,
    memo:document.getElementById("f-memo").value,
  };

  let savedProject;
  if(editId){
    const idx = projects.findIndex(x=>x.id===Number(editId));
    if(idx!==-1){
      projects[idx]={...projects[idx],...data};
      savedProject = projects[idx];
    }
  } else {
    savedProject = {id:Date.now(),...data,orders:[],bills:[]};
    projects.push(savedProject);
  }

  closeModal("modal-project");
  // 완료 상태로 변경된 경우 완료된 현장 탭으로 이동 + 엑셀 저장 안내
  if(data.status==="완료"){
    renderPage(currentTab);
    updateCompletedTabBadge();
    if(currentTab===1){
      showTab(7);
    } else {
      updateCompletedTabBadge();
    }
    // 완료 전환 시 엑셀 저장 유도
    setTimeout(()=>{
      if(confirm(`✅ "${data.aptName||data.customerName}" 현장이 완료 처리되었습니다.\n\n완료현장 엑셀 파일을 지금 저장하시겠습니까?\n(백업용으로 보관하실 때 유용합니다)`)){
        downloadCompletedExcel();
      }
    }, 300);
  } else {
    renderPage(currentTab);
    updateCompletedTabBadge();
  }

  // 기술자재형: 공사이용안내문발송일이 새로 입력된 경우 안내서 발송 창 자동 팝업
  if(data.constructionType === "기술자재형" && data.guideSentDate && data.guideSentDate !== prevGuideSentDate){
    setTimeout(()=>{ openGuideEmail(savedProject.id); }, 200);
  }
}

// ── 공사안내문 자동발송 ──
function openNoticeEmail(pid){
  const p = projects.find(x=>x.id===pid);
  if(!p)return;
  selProjectId = pid;
  emailAttachments = [];

  const subject = `[공사안내] ${p.aptName||p.customerName} ${p.constructionName||""} 공사 진행 안내`;
  const body = `안녕하세요, ${p.customerName} 담당자님.\n\n아래와 같이 공사 진행을 안내드립니다.\n\n■ 현장명: ${p.aptName||"-"}\n■ 공사명: ${p.constructionName||"-"}\n■ 공사형태: ${p.constructionType}\n■ 낙찰일: ${p.bidConfirmDate||"-"}\n■ 낙찰금액: ${fmtNum(p.bidPrice)}\n${p.patentNo?`■ 특허번호: ${p.patentNo}\n`:""}\n공사와 관련한 상세 사항은 첨부파일을 참고해 주시기 바랍니다.\n궁금하신 사항은 언제든지 연락 주시기 바랍니다.\n\n감사합니다.`;

  document.getElementById("notice-body").innerHTML = buildEmailForm(p.contactEmail||"", subject, body, "sendNoticeEmail");
  openModal("modal-notice");
}

function sendNoticeEmail(){
  const to=document.getElementById("e-to").value;
  const subject=document.getElementById("e-subject").value;
  const body=document.getElementById("e-body").value;
  const clientRadio = document.querySelector('input[name="mail-client"]:checked');
  const client = clientRadio ? clientRadio.value : "hiworks";
  if(client==="hiworks"){
    const hwUrl = buildHiworksUrl(to, subject, body);
    if(hwUrl) window.open(hwUrl, "_blank"); else return;
  } else if(client==="gmail"){
    window.open(`https://mail.google.com/mail/?view=cm&to=${encodeURIComponent(to)}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`,"_blank");
  } else {
    window.open(`mailto:${to}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`);
  }
  if(selProjectId){
    const p=projects.find(x=>x.id===selProjectId);
    if(p){ p.noticeSentDate=todayStr(); saveData(); }
  }
  document.getElementById("notice-body").innerHTML=`<div class="email-success"><div class="icon">✅</div><p style="font-weight:700;margin-bottom:6px">메일이 열렸습니다</p><p style="font-size:13px;color:#6b7280;margin-bottom:16px">내용 확인 후 보내기를 눌러 발송을 완료해 주세요.</p><button class="btn btn-primary" onclick="closeModal('modal-notice');renderPage(currentTab)">확인</button></div>`;
}

// ── 공문 문서번호 생성 ──
function buildDocumentNumber(){
  const d = new Date();
  const yyyy = d.getFullYear();
  const mm   = String(d.getMonth()+1).padStart(2,'0');
  const dd   = String(d.getDate()).padStart(2,'0');
  return `제 ${yyyy}-${mm}${dd}-01 호`;
}

// ── PDF 병합 유틸 ──
function base64ToUint8Array(base64){
  const b64 = base64.includes(',') ? base64.split(',')[1] : base64;
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}

// ── 공종안내문 + 로드맵 합본 PDF 다운로드 ──
async function mergeCategoryAndRoadmapPdf(p){
  if(typeof PDFLib === 'undefined'){
    alert("PDF 라이브러리를 불러오는 중입니다. 잠시 후 다시 시도해주세요.");
    return;
  }

  const category = p.category || "";
  const catPdf   = guidePdfStore.categories[category];
  const roadmap  = guidePdfStore.roadmap;

  if(!catPdf && !roadmap){
    alert(`합본할 PDF가 없습니다.\n⚙️ 설정 탭에서 '${category||"공종"}' 안내문과 로드맵을 먼저 업로드해주세요.`);
    return;
  }

  try{
    const { PDFDocument } = PDFLib;
    const mergedPdf = await PDFDocument.create();

    if(catPdf){
      const catBytes = base64ToUint8Array(catPdf.base64);
      const catDoc   = await PDFDocument.load(catBytes, { ignoreEncryption: true });
      const pages    = await mergedPdf.copyPages(catDoc, catDoc.getPageIndices());
      pages.forEach(pg => mergedPdf.addPage(pg));
    }

    if(roadmap){
      const rmBytes = base64ToUint8Array(roadmap.base64);
      const rmDoc   = await PDFDocument.load(rmBytes, { ignoreEncryption: true });
      const pages   = await mergedPdf.copyPages(rmDoc, rmDoc.getPageIndices());
      pages.forEach(pg => mergedPdf.addPage(pg));
    }

    const pdfBytes = await mergedPdf.save();
    const blob     = new Blob([pdfBytes], { type: 'application/pdf' });
    const url      = URL.createObjectURL(blob);
    const a        = document.createElement('a');
    const aptLabel = p.aptName || p.customerName || "현장";
    a.href     = url;
    a.download = `POUR공법_공종안내문+로드맵_${aptLabel}.pdf`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    if(!catPdf) alert(`⚠️ '${category}' 공종 안내문이 미등록 상태라 로드맵만 다운로드됩니다.\n설정 탭에서 공종 안내문을 등록해주세요.`);
    if(!roadmap) alert("⚠️ 로드맵 PDF가 미등록 상태라 공종 안내문만 다운로드됩니다.\n설정 탭에서 로드맵을 등록해주세요.");
  }catch(err){
    console.error(err);
    alert("PDF 병합 중 오류가 발생했습니다: " + err.message);
  }
}

function escHtml(str){
  return (str||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// 첨부파일 처리
function handleAttachFiles(e){
  const files = Array.from(e.target.files);
  files.forEach(f=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      emailAttachments.push({name:f.name, size:f.size, dataUrl:ev.target.result});
      renderAttachList();
    };
    reader.readAsDataURL(f);
  });
  e.target.value="";
}

function renderAttachList(){
  const el = document.getElementById("attach-list");
  if(!el)return;
  if(emailAttachments.length===0){el.innerHTML="";return;}
  el.innerHTML = emailAttachments.map((a,i)=>`
    <div class="attach-item">
      <span class="fname">📎 ${escHtml(a.name)}</span>
      <span class="fsize">(${(a.size/1024).toFixed(1)}KB)</span>
      <button class="attach-btn-del" onclick="removeAttach(${i})">✕</button>
    </div>`).join("");
}

function removeAttach(i){
  emailAttachments.splice(i,1);
  renderAttachList();
}

function openEmailModal(to,subject,body){

function sendEmail(){
  const to=document.getElementById("e-to").value;
  const subject=document.getElementById("e-subject").value;
  const body=document.getElementById("e-body").value;
  const clientRadio = document.querySelector('input[name="mail-client"]:checked');
  const client = clientRadio ? clientRadio.value : "hiworks";
  if(client==="hiworks"){
    const hwUrl = buildHiworksUrl(to, subject, body);
    if(hwUrl) window.open(hwUrl, "_blank"); else return;
  } else if(client==="gmail"){
    window.open(`https://mail.google.com/mail/?view=cm&to=${encodeURIComponent(to)}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`,"_blank");
  } else {
    window.open(`mailto:${to}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`);
  }
  if(selBillId){const b=allBills.find(x=>x.id===selBillId);if(b)b.emailSentDate=todayStr();}
  document.getElementById("email-body").innerHTML=`<div class="email-success"><div class="icon">✅</div><p style="font-weight:700;margin-bottom:6px">메일이 열렸습니다</p><p style="font-size:13px;color:#6b7280;margin-bottom:16px">내용 확인 후 보내기를 눌러 발송을 완료해 주세요.</p><button class="btn btn-primary" onclick="closeModal('modal-email');renderPage(currentTab)">확인</button></div>`;
}

  else{amount=b.patentAmt;type="특허료";}

  }

function updateBillDate(bid,field,value){
  const b=allBills.find(x=>x.id===bid);
  if(!b)return;
  b[field]=value;
  if(field==="depositDate"&&value){
    b.status="수금완료";
  } else if(field==="depositDate"&&!value){
    // 입금일 삭제 → 미수금 또는 계산서발행 상태로 복원
    b.status=b.invoiceDate?"계산서발행":"미수금";
  } else if(field==="invoiceDate"&&value&&!b.depositDate){
    b.status="계산서발행";
  } else if(field==="invoiceDate"&&!value&&!b.depositDate){
    b.status="미수금";
  }
  saveData();
  renderPage(currentTab);
}

let orderProjectId = null;

function filterOrderProjects(val){
  const dropdown = document.getElementById("o-project-dropdown");
  // 기본적으로 완료현장 제외 (주문 추가 모달에서는 진행중 현장만 표시)
  const activeProjects = projects.filter(p => p.status !== "완료");
  const matches = val.trim()
    ? activeProjects.filter(p =>
        p.customerName.includes(val) ||
        (p.aptName && p.aptName.includes(val))
      )
    : activeProjects;

  if(matches.length===0){
    dropdown.innerHTML=`<div style="padding:10px 14px;color:#9ca3af;font-size:13px">검색 결과 없음</div>`;
  } else {
    dropdown.innerHTML = matches.map(p=>`
      <div onclick="selectOrderProject(${p.id},'${escHtml(p.customerName+(p.aptName?' · '+p.aptName:''))}')"
        style="padding:9px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;gap:6px"
        onmouseover="this.style.background='#f3f4f6'" onmouseout="this.style.background=''">
        <span style="font-weight:600">${p.customerName}</span>
        ${p.aptName?`<span style="color:#6b7280;font-size:12px">· ${p.aptName}</span>`:''}
        <span class="badge ${typeColor(p.constructionType)}" style="font-size:10px;margin-left:auto">${p.constructionType}</span>
      </div>`).join("");
  }
  dropdown.style.display="block";
}

function submitOrder(){
  const editPid = document.getElementById("o-edit-pid").value;
  const editOid = document.getElementById("o-edit-oid").value;
  const date = document.getElementById("o-date").value;
  const amount = document.getElementById("o-amount").value;
  const invdate = document.getElementById("o-invdate").value;
  const depdate = document.getElementById("o-depdate").value;

  if(editPid && editOid){
    // 수정 모드
    if(!date||!amount) return alert("주문일과 금액은 필수입니다.");
    const p = projects.find(x=>x.id===Number(editPid));
    if(!p) return;
    const o = p.orders.find(x=>x.id===Number(editOid));
    if(!o) return;
    o.date = date;
    o.amount = Number(amount);
    o.unitPrice = Number(amount);
    o.invoiceDate = invdate;
    o.depositDate = depdate;
    p.orders.sort((a,b)=>(a.date||"")<(b.date||"")?-1:(a.date||"")>(b.date||"")?1:0);
    closeModal("modal-order");
    saveData();
    renderPage(currentTab);
    showUndoToast("주문이 수정되었습니다.", true);
  } else {
    // 추가 모드
    const pid = document.getElementById("o-project-id").value;
    if(!date||!amount||!pid) return alert("주문일, 금액, 현장을 모두 입력하세요.");
    const p = projects.find(x=>x.id===Number(pid));
    if(!p) return;
    p.orders.push({id:Date.now(),date,item:"자재",qty:1,unitPrice:Number(amount),amount:Number(amount),invoiceDate:invdate,depositDate:depdate});
    p.orders.sort((a,b)=>(a.date||"")<(b.date||"")?-1:(a.date||"")>(b.date||"")?1:0);
    closeModal("modal-order");
    saveData();
    renderPage(currentTab);
  }
}

// ── 백업 다운로드 / 복원 ──
function downloadBackup(){
  const data = JSON.stringify({projects, allBills, exportedAt: new Date().toISOString()}, null, 2);
  const blob = new Blob([data], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const dateStr = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `대금청구_백업_${dateStr}.json`;
  a.click();
  URL.revokeObjectURL(url);
  if(window._showSaved) window._showSaved("💾 백업 저장됨");
}

function restoreBackup(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    try{
      const parsed = JSON.parse(ev.target.result);
      if(!parsed.projects) return alert("올바른 백업 파일이 아닙니다.");
      const exportedAt = parsed.exportedAt ? `\n백업일시: ${new Date(parsed.exportedAt).toLocaleString("ko-KR")}` : "";
      const msg = `현장 ${parsed.projects.length}건, 청구서 ${(parsed.allBills||[]).length}건${exportedAt}\n\n기존 데이터를 이 백업으로 교체할까요?`;
      if(!confirm(msg)) return;
      projects = parsed.projects;
      allBills = parsed.allBills || [];
      saveData();
      renderPage(currentTab);
      alert("✅ 복원 완료!");
    } catch(err){
      alert("파일을 읽을 수 없습니다. JSON 백업 파일을 선택해주세요.");
    }
  };
  reader.readAsText(file);
  e.target.value = "";
}

// ── 자동저장 / 자동불러오기 ──
const SAVE_KEY = "billing_app_data_v2";
const FB_CONFIG_KEY = "fb_config_v1";

// ── Firebase 동기화 ──
let _fbDb = null, _fbRef = null, _fbListening = false, _fbIgnoreNext = false;

function fbLoadConfig(){ try{ return JSON.parse(localStorage.getItem(FB_CONFIG_KEY)||"null"); }catch(e){ return null; } }
function fbSaveConfig(cfg){ localStorage.setItem(FB_CONFIG_KEY, JSON.stringify(cfg)); }

async function fbInit(cfg){
  try{
    if(!firebase.apps.length) firebase.initializeApp(cfg);
    else firebase.app(); // 이미 초기화됨
    _fbDb = firebase.database();
    _fbRef = _fbDb.ref("netform_app/data");
    return true;
  }catch(e){ console.error("Firebase 초기화 오류:", e); return false; }
}

async function fbSave(){
  if(!_fbRef) return;
  try{
    _fbIgnoreNext = true;
    await _fbRef.set({ projects, allBills, _savedAt: Date.now() });
    fbShowStatus("☁️ 클라우드 저장됨", "#16a34a");
  }catch(e){ fbShowStatus("⚠️ 클라우드 저장 실패", "#dc2626"); console.warn("fbSave error:", e); }
}

async function fbLoad(){
  if(!_fbRef) return false;
  try{
    const snap = await _fbRef.get();
    if(!snap.exists()) return false;
    const d = snap.val();
    if(d.projects) projects = d.projects;
    if(d.allBills) allBills = d.allBills;
    normalizeData();
    return true;
  }catch(e){ console.warn("fbLoad error:", e); return false; }
}

function fbListen(){
  if(!_fbRef || _fbListening) return;
  _fbListening = true;
  _fbRef.on("value", snap => {
    if(_fbIgnoreNext){ _fbIgnoreNext = false; return; }
    if(!snap.exists()) return;
    const d = snap.val();
    if(d.projects) projects = d.projects;
    if(d.allBills) allBills = d.allBills;
    normalizeData();
    try{ localStorage.setItem(SAVE_KEY, JSON.stringify({projects, allBills})); }catch(_){}
    renderPage(currentTab);
    fbShowStatus("🔄 다른 기기에서 변경 반영됨", "#4338ca");
  });
}

function fbShowStatus(msg, color){
  const el = document.getElementById("save-indicator");
  if(!el) return;
  el.textContent = msg; el.style.color = color||"#a5b4fc";
  clearTimeout(el._timer);
  el._timer = setTimeout(()=>{ el.textContent=""; }, 3000);
}

async function fbConnect(cfg){
  const ok = await fbInit(cfg);
  if(!ok){ alert("Firebase 연결 실패. 설정값을 확인해주세요."); return false; }
  fbSaveConfig(cfg);

  // 현재 로컬 데이터 백업
  const localProjects = JSON.parse(JSON.stringify(projects));
  const localBills = JSON.parse(JSON.stringify(allBills));
  const hasLocalData = localProjects.length > 0 || localBills.length > 0;

  const loaded = await fbLoad();
  if(loaded){
    const hasFirebaseData = projects.length > 0 || allBills.length > 0;

    if(hasLocalData && hasFirebaseData){
      const choice = confirm(
        "Firebase에 기존 데이터가 있습니다.\n\n" +
        "✅ 확인: Firebase 데이터 사용\n" +
        "❌ 취소: 방금 입력한 데이터를 Firebase에 업로드"
      );
      if(!choice){
        // 로컬 데이터 복원 후 Firebase에 업로드
        projects = localProjects;
        allBills = localBills;
        await fbSave();
        try{ localStorage.setItem(SAVE_KEY, JSON.stringify({projects, allBills})); }catch(_){}
        renderPage(currentTab);
        fbShowStatus("☁️ Firebase 연결됨 — 현재 데이터 업로드 완료", "#16a34a");
      } else {
        try{ localStorage.setItem(SAVE_KEY, JSON.stringify({projects, allBills})); }catch(_){}
        renderPage(currentTab);
        fbShowStatus("☁️ Firebase 연결됨 — 데이터 불러옴", "#16a34a");
      }
    } else {
      try{ localStorage.setItem(SAVE_KEY, JSON.stringify({projects, allBills})); }catch(_){}
      renderPage(currentTab);
      fbShowStatus("☁️ Firebase 연결됨 — 데이터 불러옴", "#16a34a");
    }
  } else {
    // Firebase에 데이터 없으면 현재 데이터 업로드
    await fbSave();
    fbShowStatus("☁️ Firebase 연결됨 — 현재 데이터 업로드 완료", "#16a34a");
  }
  fbListen();
  renderFbSection();
  return true;
}

function fbDisconnect(){
  if(_fbRef && _fbListening){ _fbRef.off(); _fbListening = false; }
  _fbDb = null; _fbRef = null;
  fbSaveConfig(null);
  renderFbSection();
  fbShowStatus("🔌 Firebase 연결 해제됨", "#6b7280");
}

function renderFbSection(){
  const el = document.getElementById("fb-sync-section");
  if(!el) return;
  const cfg = fbLoadConfig();
  const connected = !!_fbRef;
  el.innerHTML = connected
    ? `<div style="display:flex;align-items:center;gap:10px;padding:10px 0">
        <span style="font-size:20px">🟢</span>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:700;color:#16a34a">Firebase 연결됨</div>
          <div style="font-size:11px;color:#6b7280">${cfg?.databaseURL||""}</div>
        </div>
        <button class="btn btn-gray btn-sm" onclick="if(confirm('Firebase 연결을 해제하시겠습니까?'))fbDisconnect()">연결 해제</button>
      </div>`
    : `<div>
        <p style="font-size:12px;color:#374151;margin-bottom:10px">Firebase 프로젝트의 설정값을 붙여넣으세요.</p>
        <textarea id="fb-cfg-input" rows="8" placeholder='{\n  "apiKey": "...",\n  "authDomain": "...",\n  "databaseURL": "...",\n  "projectId": "...",\n  "storageBucket": "...",\n  "messagingSenderId": "...",\n  "appId": "..."\n}'
          style="width:100%;font-size:11px;font-family:monospace;border:1px solid #d1d5db;border-radius:8px;padding:10px;resize:vertical;box-sizing:border-box;outline:none"></textarea>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="btn btn-primary" style="flex:1" onclick="fbConnectFromUI()">🔗 연결하기</button>
        </div>
        <div style="margin-top:10px;padding:10px;background:#fef9c3;border-radius:8px;font-size:11px;color:#713f12;line-height:1.7">
          📋 <b>설정 방법:</b><br>
          1. <a href="https://console.firebase.google.com" target="_blank" style="color:#1d4ed8">console.firebase.google.com</a> → 프로젝트 생성<br>
          2. 프로젝트 설정 → 내 앱 → 웹앱 추가 → SDK 설정의 <b>firebaseConfig</b> 복사<br>
          3. 빌드 → Realtime Database → 데이터베이스 만들기 (테스트 모드)<br>
          4. 위 입력창에 붙여넣고 연결하기
        </div>
      </div>`;
}

async function fbConnectFromUI(){
  const raw = (document.getElementById("fb-cfg-input")||{}).value||"";
  let cfg;
  try{
    // JSON 객체 또는 JS 객체 리터럴 파싱
    const cleaned = raw.trim().replace(/^const\s+\w+\s*=\s*/, "").replace(/;$/, "");
    cfg = JSON.parse(cleaned);
  }catch(e){ alert("설정값 형식 오류입니다. Firebase 콘솔에서 JSON 형태로 복사해주세요."); return; }
  if(!cfg.apiKey||!cfg.databaseURL){ alert("apiKey와 databaseURL이 필요합니다."); return; }
  await fbConnect(cfg);
}

function saveData(){
  try{
    localStorage.setItem(SAVE_KEY, JSON.stringify({projects, allBills}));
  }catch(e){ console.warn("저장 실패", e); }
  if(_fbRef) fbSave();
}

// ── 데이터 정규화: orders 없는 프로젝트 방어 ──
function normalizeData(){
  projects = (projects||[]).map(p => ({
    ...p,
    orders: Array.isArray(p.orders) ? p.orders : [],
    bills:  Array.isArray(p.bills)  ? p.bills  : [],
  }));
  allBills = Array.isArray(allBills) ? allBills : [];
}

function loadData(){
  try{
    // v2 키 먼저 시도
    let raw = localStorage.getItem(SAVE_KEY);
    // 없으면 구버전 키에서 마이그레이션
    if(!raw) raw = localStorage.getItem("billing_app_data");
    if(!raw) return;
    const parsed = JSON.parse(raw);
    if(parsed.projects) projects = parsed.projects;
    if(parsed.allBills) allBills = parsed.allBills;
    normalizeData();
  }catch(e){ console.warn("불러오기 실패", e); }
}
